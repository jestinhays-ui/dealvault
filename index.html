<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealVault · RE Investment Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090e1a;--bg1:#0d1525;--bg2:#111d32;--bg3:#172440;--bg4:#1e2e4e;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.18);
  --t1:#e0eaff;--t2:#8096be;--t3:#415070;
  --gold:#f5a623;--gold2:rgba(245,166,35,0.15);--gold3:rgba(245,166,35,0.07);
  --ok:#1ec88a;--ok2:rgba(30,200,138,0.13);
  --warn:#f0c040;--warn2:rgba(240,192,64,0.13);
  --bad:#ff4d5e;--bad2:rgba(255,77,94,0.13);
  --info:#4d8ef5;--info2:rgba(77,142,245,0.13);
  --purple:#a78af5;--purple2:rgba(167,138,245,0.13);
  --r:8px;--r2:12px;--r3:16px;
  --mono:'JetBrains Mono',monospace;
  --head:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --sh:0 4px 28px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--body);font-size:14px;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ─── NAV ─── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,14,26,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--b);height:56px;display:flex;align-items:center;padding:0 18px;gap:8px}
.logo{font-family:var(--head);font-size:22px;font-weight:700;letter-spacing:.5px;white-space:nowrap;margin-right:6px}
.logo span{color:var(--gold)}
.nav-sep{width:1px;height:22px;background:var(--b2);flex-shrink:0;margin:0 4px}
.nb{background:none;border:none;color:var(--t2);font-family:var(--body);font-size:13px;font-weight:500;padding:6px 10px;border-radius:var(--r);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nb:hover{color:var(--t1);background:var(--bg3)}
.nb.active{color:var(--gold);background:var(--gold3)}
.nc{background:var(--bg4);color:var(--t3);font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:20px;min-width:16px;text-align:center}
.nc.pulse{background:var(--purple2);color:var(--purple)}
.nav-r{margin-left:auto;display:flex;gap:7px;align-items:center}
.pipeline-bar{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--t3);margin:0 4px}
.pipe-step{padding:2px 8px;border-radius:20px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--b)}
.pipe-step:hover{color:var(--t1);border-color:var(--b2)}
.pipe-step.active{color:var(--gold);border-color:var(--gold);background:var(--gold3)}
.pipe-arrow{color:var(--t3);font-size:9px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-family:var(--body);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-gold{background:var(--gold);color:#090e1a;font-weight:600}
.btn-gold:hover{background:#ffb840;transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,166,35,0.3)}
.btn-ghost{background:none;border:1px solid var(--b2);color:var(--t2)}
.btn-ghost:hover{border-color:var(--b3);color:var(--t1);background:var(--bg3)}
.btn-danger{background:none;border:1px solid rgba(255,77,94,0.25);color:var(--bad)}
.btn-danger:hover{background:var(--bad2);border-color:var(--bad)}
.btn-purple{background:var(--purple2);border:1px solid rgba(167,138,245,0.3);color:var(--purple)}
.btn-purple:hover{background:rgba(167,138,245,0.2)}
.btn-ok{background:var(--ok2);border:1px solid rgba(30,200,138,0.25);color:var(--ok)}
.btn-sm{padding:4px 9px;font-size:12px}

/* ─── LAYOUT ─── */
.main{padding-top:56px;min-height:100vh}
.page{padding:20px;max-width:1400px;margin:0 auto}
.spin{width:36px;height:36px;border:2px solid var(--bg3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px;color:var(--t3);font-family:var(--head);font-size:18px;letter-spacing:1px}

/* ─── PAGE HEADER ─── */
.ph{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.ph h1{font-family:var(--head);font-size:30px;font-weight:700;letter-spacing:.5px}
.ph h1 span{color:var(--gold)}
.ph h1 span.purple{color:var(--purple)}
.ph h1 span.ok{color:var(--ok)}

/* ─── STATS BAR ─── */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px;margin-bottom:16px}
.sc{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:10px 13px}
.sc-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.sc-v{font-family:var(--mono);font-size:16px;font-weight:500}

/* ─── PIPELINE KANBAN ─── */
.pipeline-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}
.pipe-col{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden}
.pipe-col-hdr{padding:10px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px}
.pipe-col-title{font-family:var(--head);font-size:15px;font-weight:700;letter-spacing:.3px}
.pipe-col-count{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:20px;background:var(--bg3);color:var(--t3)}
.pipe-card{padding:11px 13px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .12s}
.pipe-card:last-child{border:none}
.pipe-card:hover{background:var(--bg2)}
.pipe-card-addr{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:3px}
.pipe-card-meta{font-size:11px;color:var(--t3)}
.pipe-card-price{font-family:var(--mono);font-size:13px;font-weight:500;margin-top:4px}
.pipe-card-score{display:flex;align-items:center;gap:6px;margin-top:5px}
.pipe-score-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pipe-score-fill{height:100%;border-radius:2px}

/* ─── FILTERS ─── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.fl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.fb{background:none;border:1px solid var(--b);color:var(--t3);font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;cursor:pointer;transition:all .15s;font-family:var(--body)}
.fb:hover{border-color:var(--b2);color:var(--t2)}
.fb.on{border-color:var(--gold);color:var(--gold);background:var(--gold3)}
.sw{position:relative;min-width:170px;max-width:260px}
.sw input{width:100%;background:var(--bg2);border:1px solid var(--b);color:var(--t1);padding:6px 9px 6px 27px;border-radius:var(--r);font-family:var(--body);font-size:12px;outline:none;transition:border .15s}
.sw input:focus{border-color:var(--b2)}
.sw input::placeholder{color:var(--t3)}
.sw-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.sort-sel{background:var(--bg2);border:1px solid var(--b);color:var(--t2);padding:5px 8px;border-radius:var(--r);font-family:var(--body);font-size:12px;cursor:pointer;outline:none}

/* ─── PROPERTY GRID ─── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:13px}
.empty{text-align:center;padding:70px 20px;color:var(--t3)}
.empty .ei{font-size:44px;margin-bottom:14px;opacity:.3}
.empty h3{font-family:var(--head);font-size:22px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty p{font-size:13px;max-width:300px;margin:0 auto 18px;line-height:1.6}

/* ─── PROPERTY CARD ─── */
.pcard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;transition:all .18s;position:relative;cursor:pointer}
.pcard:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:var(--sh)}
.pcard.cmp{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.ctop{padding:13px 15px 11px;border-bottom:1px solid var(--b)}
.cbadges{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.bg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;font-family:var(--head);text-transform:uppercase}
.bg-strat{background:var(--info2);color:var(--info)}
.bg-uploaded{background:var(--purple2);color:var(--purple)}
.bg-prospect{background:rgba(167,138,245,0.15);color:#c4aff8}
.bg-analyzing{background:var(--warn2);color:var(--warn)}
.bg-offer{background:rgba(245,166,35,0.15);color:var(--gold)}
.bg-contract{background:var(--info2);color:var(--info)}
.bg-deal{background:var(--ok2);color:var(--ok)}
.bg-monitoring{background:var(--ok2);color:var(--ok)}
.bg-archived{background:var(--bg3);color:var(--t3)}
.bg-src{background:var(--bg3);color:var(--t3)}
.cadr{font-family:var(--head);font-size:18px;font-weight:700;color:var(--t1);line-height:1.2;margin-bottom:2px}
.cmeta{font-size:11px;color:var(--t3);line-height:1.5}
.cprice{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--t1);margin-top:6px}
.cprice span{font-size:11px;color:var(--t3);font-weight:400}
.ckpis{padding:10px 15px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.kc{text-align:center}
.klbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:2px}
.kval{font-family:var(--mono);font-size:13px;font-weight:500}
.kval.ok{color:var(--ok)}.kval.warn{color:var(--warn)}.kval.bad{color:var(--bad)}.kval.n{color:var(--t1)}
.cscore{padding:8px 15px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--b)}
.cstk{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.csfill{height:100%;border-radius:2px;transition:width .4s}
.csnum{font-family:var(--mono);font-size:12px;font-weight:600;min-width:28px;text-align:right}
.csverd{font-size:11px;font-weight:700;font-family:var(--head)}
.cacts{padding:8px 15px;display:flex;gap:5px;border-top:1px solid var(--b)}
.cacts .btn{flex:1;justify-content:center;font-size:11px;padding:5px 7px}
.ctog{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:4px;border:1.5px solid var(--b2);background:rgba(0,0,0,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;z-index:2;color:var(--t3)}
.ctog:hover{border-color:var(--gold);color:var(--gold)}
.ctog.on{background:var(--gold);border-color:var(--gold);color:#090e1a;font-weight:700}
.ai-badge{position:absolute;bottom:8px;right:8px;background:var(--purple2);border:1px solid rgba(167,138,245,.3);color:var(--purple);font-size:9px;font-family:var(--head);font-weight:700;padding:2px 6px;border-radius:20px;pointer-events:none}

/* ─── DETAIL ─── */
.back-btn{background:none;border:none;color:var(--t3);font-size:13px;font-family:var(--body);cursor:pointer;display:flex;align-items:center;gap:5px;padding:0 0 8px;transition:color .15s}
.back-btn:hover{color:var(--t1)}
.dtitle{font-family:var(--head);font-size:32px;font-weight:700;line-height:1.2}
.dmeta{font-size:13px;color:var(--t2);margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dacts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--b);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:none;border:none;color:var(--t3);font-family:var(--body);font-size:13px;font-weight:500;padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ─── KPI CARDS ─── */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;margin-bottom:16px}
.kcard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px}
.kcard-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kcard-val{font-family:var(--mono);font-size:20px;font-weight:500;line-height:1.2}
.kcard-sub{font-size:11px;color:var(--t3);margin-top:3px}
.kcard-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:7px;overflow:hidden}
.kcard-bar-fill{height:100%;border-radius:2px;opacity:.7}

/* ─── SCORE CARD ─── */
.scard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:18px;margin-bottom:16px;display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap}
.sbig{text-align:center;min-width:100px}
.sbig-num{font-family:var(--mono);font-size:56px;font-weight:500;line-height:1}
.sbig-lbl{font-size:11px;color:var(--t3);margin-top:2px}
.sbig-verd{font-family:var(--head);font-size:14px;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.sbdown{flex:1;min-width:200px}
.sbdown-title{font-size:10px;color:var(--t3);margin-bottom:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sbrow{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.sbrow-lbl{font-size:12px;color:var(--t2);min-width:135px}
.sbrow-trk{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.sbrow-fill{height:100%;border-radius:2px}
.sbrow-val{font-family:var(--mono);font-size:11px;min-width:48px;text-align:right}

/* ─── WATERFALL ─── */
.wf{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;margin-bottom:13px}
.wfr{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--b);transition:background .1s;gap:7px}
.wfr:last-child{border:none}
.wfr:hover{background:var(--bg2)}
.wfr.tot{background:var(--bg2)}
.wfl{flex:1;font-size:13px;color:var(--t2)}
.wfl.ind{padding-left:13px;font-size:12px;color:var(--t3)}
.wfl.str{color:var(--t1);font-weight:600}
.wfv{font-family:var(--mono);font-size:13px;font-weight:500;min-width:105px;text-align:right}
.wfv.ok{color:var(--ok)}.wfv.bad{color:var(--bad)}.wfv.n{color:var(--t1)}.wfv.dim{color:var(--t3)}

/* ─── BRRRR ─── */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:9px;margin-bottom:13px}
.bcard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:12px}
.bcard h4{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:6px}
.bcard .bv{font-family:var(--mono);font-size:19px;font-weight:500}
.bcard .bs{font-size:11px;color:var(--t3);margin-top:3px}
.bres{padding:11px 14px;border-radius:var(--r);margin-bottom:13px;display:flex;align-items:flex-start;gap:9px;font-size:13px;line-height:1.5}
.bres.ok{background:var(--ok2);border:1px solid rgba(30,200,138,.25)}
.bres.warn{background:var(--warn2);border:1px solid rgba(240,192,64,.25)}
.bres.bad{background:var(--bad2);border:1px solid rgba(255,77,94,.25)}

/* ─── STRESS TEST ─── */
.sctrl{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:13px}
.sctrl h3{font-family:var(--head);font-size:17px;font-weight:600;margin-bottom:13px}
.sr{display:grid;grid-template-columns:170px 1fr 60px;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--b)}
.sr:last-child{border:none}
.sr-lbl{font-size:13px;color:var(--t2)}
.sr input[type=range]{width:100%;accent-color:var(--gold);cursor:pointer;height:4px}
.sr-val{font-family:var(--mono);font-size:12px;font-weight:500;text-align:right;color:var(--t1)}
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:13px}
.preset{background:var(--bg3);border:1px solid var(--b);color:var(--t2);font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;font-family:var(--body);transition:all .15s}
.preset:hover{border-color:var(--b2);color:var(--t1)}

/* ─── HOLD TABLE ─── */
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{text-align:left;padding:8px 10px;color:var(--t3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b)}
.htbl td{padding:8px 10px;border-bottom:1px solid var(--b);font-family:var(--mono)}
.htbl tr:hover td{background:var(--bg2)}
.htbl tr:last-child td{border:none}
.htbl .hl td{background:rgba(245,166,35,.04)}

/* ─── DD ─── */
.ddsec{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:16px;margin-bottom:11px}
.ddsec h3{font-family:var(--head);font-size:15px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}
.ddi{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--b);cursor:pointer;transition:opacity .1s}
.ddi:last-child{border:none}
.ddi:hover{opacity:.85}
.ddcb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--b2);background:var(--bg2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.ddcb.chk{background:var(--ok);border-color:var(--ok);color:#090e1a;font-weight:700}
.ddt{flex:1;font-size:12px;color:var(--t2);line-height:1.4}
.ddt.chk{color:var(--t3);text-decoration:line-through}
.ddsev{font-size:9px;padding:1px 5px;border-radius:3px;font-family:var(--head);font-weight:700;flex-shrink:0}
.sev-h{background:var(--bad2);color:var(--bad)}.sev-m{background:var(--warn2);color:var(--warn)}.sev-l{background:var(--bg3);color:var(--t3)}
.ddprog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:14px}
.ddpfill{height:100%;background:var(--ok);border-radius:3px;transition:width .3s}

/* ─── EXIT ─── */
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:11px}
.ec{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:15px}
.ec h3{font-family:var(--head);font-size:16px;font-weight:600;margin-bottom:10px}
.ei{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--b);font-size:12px}
.ei:last-child{border:none}
.ek{color:var(--t3);min-width:68px;font-weight:500;flex-shrink:0}
.ev{color:var(--t2);flex:1;line-height:1.4}

/* ─── COMPARE ─── */
.csela{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:14px;margin-bottom:16px}
.csela h3{font-family:var(--head);font-size:16px;font-weight:600;margin-bottom:10px}
.cselg{display:flex;flex-wrap:wrap;gap:6px}
.cselbtn{background:var(--bg3);border:1px solid var(--b);color:var(--t2);font-size:12px;padding:5px 10px;border-radius:var(--r);cursor:pointer;transition:all .15s;font-family:var(--body)}
.cselbtn:hover{border-color:var(--b2);color:var(--t1)}
.cselbtn.on{border-color:var(--gold);color:var(--gold);background:var(--gold3)}

<script>
'use strict';
/* ─── STATE ─── */
let props=[], view='portfolio', activeId=null, dtab='overview', editP=null, cmpIds=new Set();
let fStat='all', fStrat='all', q='', sortBy='score';
let ddState={}, stressD={rd:0,vi:8,ri:0,ei:0,cx:0};
let toolD={tp:200000,tr:2000,td:25,ti:7,ttx:2400,ti2:1200,tm:10,tcx:150};
let rehab={foundation:0,roof:0,hvac:5000,plumbing:2000,electric:3000,kitchen:8000,baths:3000,flooring:4000,paint:2000,windows:0,landscape:500,demo:1000,other:0};
let activeLetter='direct';
let aiImportResult=null;

/* ─── PIPELINE STAGES ─── */
const STAGES=[
  {id:'uploaded',label:'Uploaded',color:'var(--purple)',view:'opportunity'},
  {id:'prospect',label:'Prospect',color:'#c4aff8',view:'opportunity'},
  {id:'analyzing',label:'Analyzing',color:'var(--warn)',view:'opportunity'},
  {id:'offer-out',label:'Offer Out',color:'var(--gold)',view:'portfolio'},
  {id:'under-contract',label:'Contract',color:'var(--info)',view:'portfolio'},
  {id:'deal',label:'Active Deal',color:'var(--ok)',view:'portfolio'},
  {id:'monitoring',label:'Monitoring',color:'var(--ok)',view:'portfolio'},
  {id:'archived',label:'Archived',color:'var(--t3)',view:'portfolio'}
];

/* ─── STORAGE (window.storage + localStorage fallback) ─── */
const HAS_WS=typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function';
async function sGet(k){
  if(HAS_WS){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null}catch{return null}}
  try{const v=localStorage.getItem('dv_'+k);return v?JSON.parse(v):null}catch{return null}
}
async function sSet(k,v){
  if(HAS_WS){try{await window.storage.set(k,JSON.stringify(v))}catch(e){console.warn(e)}}
  else{try{localStorage.setItem('dv_'+k,JSON.stringify(v))}catch(e){console.warn(e)}}
}
async function sDel(k){
  if(HAS_WS){try{await window.storage.delete(k)}catch{}}
  else{try{localStorage.removeItem('dv_'+k)}catch{}}
}
async function sList(pfx){
  if(HAS_WS){try{const r=await window.storage.list(pfx);return r?.keys||[]}catch{return[]}}
  const keys=[];
  try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('dv_'+pfx))keys.push(k.slice(3));}}catch{}
  return keys;
}
async function loadAll(){const ks=await sList('p:');const a=[];for(const k of ks){const p=await sGet(k);if(p)a.push(p);}return a.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));}
async function saveP(p){await sSet('p:'+p.id,p);}
async function delP(id){await sDel('p:'+id);}
async function loadDD(id){return await sGet('dd:'+id)||{};}
async function saveDD(id,d){await sSet('dd:'+id,d);}

/* ─── PROP FACTORY ─── */
function mkProp(o={}){
  return{id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
  createdAt:new Date().toISOString(),address:'',city:'',state:'',zip:'',
  type:'SFR',units:1,beds:3,baths:2,sqft:1200,yearBuilt:2000,listingUrl:'',
  strategy:'buy-hold',status:'analyzing',source:'MLS',
  listPrice:200000,offerPrice:0,purchasePrice:200000,closingPct:3,
  rent:2000,otherIncome:0,vacRate:8,mgmtPct:10,
  taxes:2400,ins:1200,hoa:0,maint:120,capex:150,utils:0,
  downPct:25,rate:7.0,term:30,
  arv:0,rehab:0,hmRate:12,hmPts:2,holdMo:6,
  appRate:3.5,rentGr:2.5,fmr:0,motivScore:0,
  aiGenerated:false,listingImages:[],agentName:'',agentPhone:'',agentEmail:'',sellerName:'',
  notes:'',motivNotes:'',offerNotes:'',...o};
}

/* ─── CALCULATIONS ─── */
function calc(p){
  const price=Math.max(1,+p.purchasePrice||+p.listPrice||1);
  const units=Math.max(1,+p.units||1);
  const grossRent=(+p.rent*units + +p.otherIncome)*12;
  const vacLoss=grossRent*((+p.vacRate)/100);
  const egi=grossRent-vacLoss;
  const mgmt=egi*((+p.mgmtPct)/100);
  const opex=+p.taxes + +p.ins + +p.hoa*12 + +p.maint*12 + +p.capex*12 + +p.utils*12 + mgmt;
  const noi=egi-opex;
  const oer=egi>0?opex/egi*100:0;
  const downAmt=price*((+p.downPct)/100);
  const closing=price*((+p.closingPct)/100);
  const loan=price-downAmt;
  const r=(+p.rate)/100/12;
  const n=(+p.term)*12;
  const mort=r>0?loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):loan/(n||360);
  const annDebt=mort*12;
  const annCF=noi-annDebt;
  const moCF=annCF/12;
  const cashIn=downAmt+closing+(p.strategy==='BRRRR'?+p.rehab:0);
  const capRate=noi/price*100;
  const coc=cashIn>0?annCF/cashIn*100:0;
  const grm=grossRent>0?price/grossRent:0;
  const dscr=annDebt>0?noi/annDebt:0;
  const pct1=price>0?+p.rent/price*100:0;
  const arv=+p.arv||0;
  const rehabC=+p.rehab||0;
  const mao70=arv>0?arv*0.70-rehabC:0;
  const totalProj=price+rehabC;
  const refi75=arv*0.75;
  const cashRecov=refi75-totalProj;
  const hmCost=price*0.9*((+p.hmRate)/100)*((+p.holdMo)/12)+price*0.9*((+p.hmPts)/100);
  const depBase=price*0.80;
  const annDep=depBase/27.5;
  let sc=0;
  if(coc>=12)sc+=20;else if(coc>=8)sc+=14;else if(coc>=5)sc+=7;else if(coc>=0)sc+=2;
  if(capRate>=8)sc+=15;else if(capRate>=6)sc+=10;else if(capRate>=4)sc+=5;
  if(moCF>=400)sc+=15;else if(moCF>=200)sc+=10;else if(moCF>=0)sc+=5;
  if(dscr>=1.5)sc+=15;else if(dscr>=1.25)sc+=10;else if(dscr>=1.0)sc+=5;
  if(pct1>=1.5)sc+=10;else if(pct1>=1.0)sc+=6;else if(pct1>=0.7)sc+=3;
  if(+p.motivScore>=60)sc+=15;else if(+p.motivScore>=30)sc+=8;else if(+p.motivScore>=10)sc+=3;
  if(units>=4)sc+=10;else if(units>=2)sc+=5;
  sc=Math.min(100,Math.max(0,Math.round(sc)));
  return{price,grossRent,vacLoss,egi,mgmt,opex,noi,oer,downAmt,closing,loan,mort,annDebt,annCF,moCF,cashIn,capRate,coc,grm,dscr,pct1,mao70,totalProj,refi75,cashRecov,hmCost,depBase,annDep,arv,rehabC,sc};
}
function scColor(s){return s>=80?'var(--ok)':s>=65?'#6dd98c':s>=50?'var(--warn)':'var(--bad)';}
function scVerdict(s){return s>=80?'Elite Deal':s>=65?'Strong Deal':s>=50?'Marginal':'Pass';}
function kcol(v,t){
  if(t==='coc')return v>=8?'ok':v>=5?'warn':'bad';
  if(t==='cap')return v>=6?'ok':v>=4?'warn':'bad';
  if(t==='cf')return v>=200?'ok':v>=0?'warn':'bad';
  if(t==='dscr')return v>=1.25?'ok':v>=1.0?'warn':'bad';
  if(t==='p1')return v>=1.0?'ok':v>=0.7?'warn':'bad';
  if(t==='grm')return v<=8?'ok':v<=12?'warn':'bad';
  return 'n';
}
function kcolHex(v,t){const c=kcol(v,t);return c==='ok'?'var(--ok)':c==='warn'?'var(--warn)':'var(--bad)';}
function f$(n){if(n===undefined||n===null||isNaN(n))return'—';const a=Math.abs(n),s=n<0?'−':'';if(a>=1e6)return s+'$'+(a/1e6).toFixed(1)+'M';return s+'$'+Math.round(a).toLocaleString();}
function fp$(n,d=1){return isNaN(n)?'0':n.toFixed(d);}
function fx(n,d=2){return isNaN(n)?'—':n.toFixed(d)+'x';}
function pbar(pct,color){return '<div class="kcard-bar"><div class="kcard-bar-fill" style="width:'+Math.min(100,Math.max(0,pct))+'%;background:'+color+'"></div></div>';}

/* ─── HOLDING ─── */
function holdRows(p,c){
  const rows=[];
  const r=(+p.rate)/100/12,n=(+p.term)*12;
  for(const yr of[1,3,5,7,10,15,20]){
    let bal=c.loan;
    for(let m=0;m<yr*12;m++){const i=bal*r,pr=c.mort-i;bal=Math.max(0,bal-pr);}
    const val=c.price*Math.pow(1+(+p.appRate)/100,yr);
    const eq=val-bal;
    const cf=c.annCF*yr*(1+(+p.rentGr)/100*yr/2);
    rows.push({yr,val,bal,eq,pp:c.loan-bal,appG:val-c.price,cf,tw:eq-c.downAmt-c.closing+cf});
  }
  return rows;
}

/* ─── NAVIGATE ─── */
function nav(v,id=null,tab='overview'){
  view=v;if(id)activeId=id;if(tab)dtab=tab;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('nb-'+v);if(el)el.classList.add('active');
  render();window.scrollTo(0,0);
}

/* ─── RENDER ─── */
function render(){
  const app=document.getElementById('app');
  try{
    if(view==='portfolio')app.innerHTML=renderPortfolio();
    else if(view==='opportunity')app.innerHTML=renderOpportunity();
    else if(view==='detail')app.innerHTML=renderDetail();
    else if(view==='compare')app.innerHTML=renderCompare();
    else if(view==='tools')app.innerHTML=renderTools();
    else if(view==='offers')app.innerHTML=renderOffers();
  }catch(e){console.error(e);app.innerHTML='<div class="empty"><h3>Render error</h3><p>'+e.message+'</p></div>';}
  document.getElementById('pc').textContent=props.filter(p=>['offer-out','under-contract','deal','monitoring'].includes(p.status)).length;
  document.getElementById('oc').textContent=props.filter(p=>['uploaded','prospect','analyzing'].includes(p.status)).length;
  document.getElementById('clrbtn').style.display=cmpIds.size>0?'flex':'none';
  const si=document.getElementById('srch');if(si)si.addEventListener('input',e=>{q=e.target.value;render();});
}

/* ─── OPPORTUNITY VIEW ─── */
function renderOpportunity(){
  const oppStages=['uploaded','prospect','analyzing'];
  const opp=props.filter(p=>oppStages.includes(p.status));
  const allC=opp.map(p=>calc(p));
  const byStage={uploaded:[],prospect:[],analyzing:[]};
  opp.forEach(p=>byStage[p.status]&&byStage[p.status].push(p));
  const stageMeta={
    uploaded:{label:'Uploaded',color:'var(--purple)',desc:'AI profiled, pending review'},
    prospect:{label:'Prospect',color:'#c4aff8',desc:'Screened, potential target'},
    analyzing:{label:'Analyzing',color:'var(--warn)',desc:'Deep analysis underway'}
  };
  const stats=[
    {l:'Opportunities',v:opp.length.toString(),c:'var(--purple)'},
    {l:'Avg Deal Score',v:fp$(allC.length?allC.reduce((s,c)=>s+c.sc,0)/allC.length:0)+'/100',c:'var(--gold)'},
    {l:'Best Score',v:allC.length?Math.max(...allC.map(c=>c.sc))+'/100':'—',c:'var(--ok)'},
    {l:'Total Value',v:f$(opp.reduce((s,p)=>s+(+p.listPrice||0),0)),c:'var(--t1)'},
  ];
  return `
  <div class="ph"><h1>Deal <span class="purple">Opportunities</span></h1></div>
  <div class="notice notice-purple">⚡ This is your deal funnel. Properties move: <b>Upload → Prospect → Analyzing → Offer Out</b>. Use AI Import to add any Zillow/Redfin listing instantly.</div>
  <div class="stats-bar">${stats.map(s=>'<div class="sc"><div class="sc-l">'+s.l+'</div><div class="sc-v" style="color:'+s.c+'">'+s.v+'</div></div>').join('')}</div>

  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn btn-purple" onclick="openAIImport()">⚡ AI Import from URL</button>
    <button class="btn btn-ghost" onclick="openAdd()">+ Manual Add</button>
    <div style="flex:1"></div>
    <div class="sw"><span class="sw-icon">⌕</span><input id="srch" class="fi" placeholder="Search…" value="${q.replace(/"/g,'&quot;')}" style="padding-left:27px"></div>
  </div>

  <div class="pipeline-wrap">
    ${oppStages.map(stageId=>{
      const m=stageMeta[stageId];
      const items=byStage[stageId]||[];
      const filtered=q?items.filter(p=>(p.address+' '+p.city).toLowerCase().includes(q.toLowerCase())):items;
      return '<div class="pipe-col">'+
        '<div class="pipe-col-hdr" style="border-left:3px solid '+m.color+'">'+
        '<div class="pipe-col-title" style="color:'+m.color+'">'+m.label+'</div>'+
        '<span class="pipe-col-count">'+filtered.length+'</span>'+
        '<span style="font-size:11px;color:var(--t3);margin-left:4px">'+m.desc+'</span>'+
        '</div>'+
        (filtered.length===0?'<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px">No properties</div>':
        filtered.map(p=>{
          const c=calc(p);const sc=c.sc;const sC=scColor(sc);
          return '<div class="pipe-card" onclick="nav(\'detail\',\''+p.id+'\')">'+
            (p.aiGenerated?'<div style="font-size:10px;color:var(--purple);font-family:var(--head);font-weight:700;margin-bottom:3px">⚡ AI PROFILED</div>':'')+
            '<div class="pipe-card-addr">'+(p.address||'Untitled Property')+'</div>'+
            '<div class="pipe-card-meta">'+(p.city?p.city+', ':'')+p.state+' · '+p.type+' · '+p.beds+'bd/'+p.baths+'ba</div>'+
            '<div class="pipe-card-price">'+f$(+p.listPrice||+p.purchasePrice)+'<span style="font-size:11px;color:var(--t3)"> · '+f$(+p.rent)+'/mo</span></div>'+
            '<div class="pipe-card-score"><span style="font-size:10px;color:var(--t3)">Score</span><div class="pipe-score-bar"><div class="pipe-score-fill" style="width:'+sc+'%;background:'+sC+'"></div></div><span style="font-family:var(--mono);font-size:11px;color:'+sC+'">'+sc+'</span></div>'+
            '<div style="display:flex;gap:5px;margin-top:7px">'+
            '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();promoteStage(\''+p.id+'\')">Promote →</button>'+
            '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();nav(\'detail\',\''+p.id+'\')">Analyze</button>'+
            '</div>'+
            '</div>';
        }).join(''))+
        '</div>';
    }).join('')}
  </div>`;
}

/* ─── PORTFOLIO VIEW ─── */
function renderPortfolio(){
  const activeStages=['offer-out','under-contract','deal','monitoring','archived'];
  let fp=props.filter(p=>activeStages.includes(p.status));
  if(fStat!=='all')fp=fp.filter(p=>p.status===fStat);
  if(fStrat!=='all')fp=fp.filter(p=>p.strategy===fStrat);
  if(q)fp=fp.filter(p=>(p.address+' '+p.city+' '+p.state).toLowerCase().includes(q.toLowerCase()));
  if(sortBy==='score')fp.sort((a,b)=>calc(b).sc-calc(a).sc);
  else if(sortBy==='cf')fp.sort((a,b)=>calc(b).moCF-calc(a).moCF);
  else if(sortBy==='cap')fp.sort((a,b)=>calc(b).capRate-calc(a).capRate);
  else if(sortBy==='price')fp.sort((a,b)=>b.purchasePrice-a.purchasePrice);
  else fp.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const allC=fp.map(p=>calc(p));
  const totVal=fp.reduce((s,p)=>s+(+p.purchasePrice||0),0);
  const totCF=allC.reduce((s,c)=>s+c.moCF,0);
  const avgCoc=allC.length?allC.reduce((s,c)=>s+c.coc,0)/allC.length:0;
  const avgCap=allC.length?allC.reduce((s,c)=>s+c.capRate,0)/allC.length:0;
  const stats=[
    {l:'Active Deals',v:fp.length.toString(),c:'var(--t1)'},
    {l:'Portfolio Value',v:f$(totVal),c:'var(--t1)'},
    {l:'Total CF / mo',v:f$(totCF)+'/mo',c:totCF>=0?'var(--ok)':'var(--bad)'},
    {l:'Avg Cap Rate',v:fp$(avgCap)+'%',c:avgCap>=6?'var(--ok)':avgCap>=4?'var(--warn)':'var(--bad)'},
    {l:'Avg CoC',v:fp$(avgCoc)+'%',c:avgCoc>=8?'var(--ok)':avgCoc>=5?'var(--warn)':'var(--bad)'},
    {l:'In Pipeline',v:props.filter(p=>['uploaded','prospect','analyzing'].includes(p.status)).length.toString(),c:'var(--purple)'},
  ];
  const statuses=[['offer-out','Offer Out'],['under-contract','Contract'],['deal','Active Deal'],['monitoring','Monitoring'],['archived','Archived']];
  const strats=[['buy-hold','Buy & Hold'],['BRRRR','BRRRR'],['section8','Sec. 8'],['flip','Flip'],['STR','STR'],['house-hack','House Hack']];
  return `
  <div class="ph"><h1>Active <span>Portfolio</span></h1><div style="flex:1"></div></div>
  ${fp.length>0?'<div class="stats-bar">'+stats.map(s=>'<div class="sc"><div class="sc-l">'+s.l+'</div><div class="sc-v" style="color:'+s.c+'">'+s.v+'</div></div>').join('')+'</div>':''}
  <div class="filter-row">
    <span class="fl">Status</span>
    <button class="fb ${fStat==='all'?'on':''}" onclick="fStat='all';render()">All</button>
    ${statuses.map(([v,l])=>'<button class="fb '+(fStat===v?'on':'')+'" onclick="fStat=\''+v+'\';render()">'+l+'</button>').join('')}
    <div style="flex:1"></div>
    <div class="sw"><span class="sw-icon">⌕</span><input id="srch" class="fi" placeholder="Search…" value="${q.replace(/"/g,'&quot;')}" style="padding-left:27px"></div>
    <select class="sort-sel" onchange="sortBy=this.value;render()">
      <option value="score" ${sortBy==='score'?'selected':''}>Score</option>
      <option value="cf" ${sortBy==='cf'?'selected':''}>Cash Flow</option>
      <option value="cap" ${sortBy==='cap'?'selected':''}>Cap Rate</option>
      <option value="price" ${sortBy==='price'?'selected':''}>Price</option>
      <option value="date" ${sortBy==='date'?'selected':''}>Newest</option>
    </select>
  </div>
  <div class="filter-row" style="margin-top:-6px">
    <span class="fl">Strategy</span>
    <button class="fb ${fStrat==='all'?'on':''}" onclick="fStrat='all';render()">All</button>
    ${strats.map(([v,l])=>'<button class="fb '+(fStrat===v?'on':'')+'" onclick="fStrat=\''+v+'\';render()">'+l+'</button>').join('')}
  </div>
  ${cmpIds.size>0?'<div class="notice" style="margin-bottom:10px">⧖ '+cmpIds.size+' selected — <button onclick="nav(\'compare\')" style="background:none;border:none;color:var(--info);cursor:pointer;font-size:12px;font-family:var(--body)">View Comparison →</button></div>':''}
  ${fp.length===0?renderEmpty():'<div class="pgrid">'+fp.map(p=>renderCard(p)).join('')+'</div>'}`;
}

function renderEmpty(){
  return '<div class="empty"><div class="ei">🏘</div><h3>No active deals</h3><p>Import a Zillow or Redfin URL with AI, or add a deal manually. New deals start as Opportunities.</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="btn btn-purple" onclick="openAIImport()">⚡ AI Import</button><button class="btn btn-ghost" onclick="openAdd()">Manual Add</button></div></div>';
}

    +'<button class="ctog '+(cmpIds.has(p.id)?'on':'')+'" onclick="event.stopPropagation();toggleCmp(\''+p.id+'\')">'+(cmpIds.has(p.id)?'✓':'+')+'</button>'
    +'<div class="ctop">'

    +'<div class="kc"><div class="klbl">Cash Flow</div><div class="kval '+kcol(c.moCF,'cf')+'">'+(c.moCF>=0?'+':'')+f$(c.moCF)+'/mo</div></div>'
    +'<div class="kc"><div class="klbl">DSCR</div><div class="kval '+kcol(c.dscr,'dscr')+'">'+fx(c.dscr)+'</div></div>'
    +'<div class="kc"><div class="klbl">1% Rule</div><div class="kval '+kcol(c.pct1,'p1')+'">'+fp$(c.pct1)+'%</div></div>'

    +'<div class="cacts" onclick="event.stopPropagation()">'

    +'<button class="btn btn-ghost btn-sm" onclick="openEdit(\''+p.id+'\')">Edit</button>'
    +'<button class="btn btn-danger btn-sm" onclick="doDelete(\''+p.id+'\')">Del</button>'
    +'</div>'
    +'</div>';
}

    {l:'1% Rule',v:fp$(c.pct1)+'%',s:'Rent / Price',pct:Math.min(100,c.pct1/1.5*100),c:kcolHex(c.pct1,'p1')},

    +'<div><div class="sh"><h3>Key Ratios</h3></div><div class="wf">'

    +wr('Net Profit Margin',fp$(c.grossRent>0?c.noi/c.grossRent*100:0)+'%',c.noi>=0?'ok':'bad')
    +wr('Loan-to-Value',fp$(100-+p.downPct)+'%','n')
    +wr('DSCR',fx(c.dscr),c.dscr>=1.25?'ok':c.dscr>=1?'warn':'bad')
    +wr('GRM',fx(c.grm,1),c.grm<=8?'ok':c.grm<=12?'warn':'bad')

/* ─── TAB: STRESS ─── */
function tabStress(p,c){
  const sd=stressD;
  const sr2=+p.rent*(1-sd.rd/100)*(+p.units||1)*12;
  const sv2=sr2*((Math.min(100,+p.vacRate+sd.vi))/100);
  const segi2=sr2-sv2;
  const smgmt2=segi2*((+p.mgmtPct)/100);
  const sopex2=+p.taxes + +p.ins + +p.hoa*12 + +p.maint*12 + +p.capex*12 + +p.utils*12 + smgmt2 + (sd.ei/100*c.opex);
  const snoi2=segi2-sopex2;
  const srate2=(+p.rate+sd.ri)/100/12;const n2=(+p.term)*12;
  const smort2=srate2>0?c.loan*srate2*Math.pow(1+srate2,n2)/(Math.pow(1+srate2,n2)-1):c.loan/n2;
  const scf2=(snoi2-smort2*12-sd.cx)/12;
  const sdscr2=smort2*12>0?snoi2/(smort2*12):0;
  const ok2=scf2>=0&&sdscr2>=1.0;const warn2=scf2>=-200||sdscr2>=0.85;
  return '<div class="sctrl"><h3>Scenario Controls</h3>'
    +'<div class="sr"><span class="sr-lbl">Rent decrease (%)</span><input type="range" min="0" max="30" value="'+sd.rd+'" oninput="stressD.rd=+this.value;render()"><span class="sr-val">'+sd.rd+'%</span></div>'
    +'<div class="sr"><span class="sr-lbl">Added vacancy (%)</span><input type="range" min="0" max="35" value="'+sd.vi+'" oninput="stressD.vi=+this.value;render()"><span class="sr-val">+'+sd.vi+'%</span></div>'
    +'<div class="sr"><span class="sr-lbl">Rate increase (%)</span><input type="range" min="0" max="4" step="0.25" value="'+sd.ri+'" oninput="stressD.ri=+this.value;render()"><span class="sr-val">+'+sd.ri+'%</span></div>'
    +'<div class="sr"><span class="sr-lbl">Expense increase (%)</span><input type="range" min="0" max="50" value="'+sd.ei+'" oninput="stressD.ei=+this.value;render()"><span class="sr-val">+'+sd.ei+'%</span></div>'
    +'<div class="sr"><span class="sr-lbl">One-time CapEx ($)</span><input type="range" min="0" max="30000" step="500" value="'+sd.cx+'" oninput="stressD.cx=+this.value;render()"><span class="sr-val">'+f$(sd.cx)+'</span></div>'
    +'<div class="presets"><span style="font-size:11px;color:var(--t3);align-self:center">Presets:</span>'
    +'<button class="preset" onclick="stressD={rd:10,vi:10,ri:.5,ei:10,cx:0};render()">Mild Downturn</button>'
    +'<button class="preset" onclick="stressD={rd:15,vi:15,ri:1,ei:20,cx:5000};render()">Moderate Recession</button>'
    +'<button class="preset" onclick="stressD={rd:25,vi:25,ri:2,ei:30,cx:15000};render()">Severe Crash</button>'
    +'<button class="preset" onclick="stressD={rd:0,vi:30,ri:0,ei:0,cx:0};render()">Long Vacancy</button>'
    +'<button class="preset" onclick="stressD={rd:0,vi:0,ri:3,ei:0,cx:0};render()">Rate Spike +3%</button>'
    +'<button class="preset" onclick="stressD={rd:0,vi:8,ri:0,ei:0,cx:0};render()">Reset</button>'
    +'</div></div>'
    +'<div class="kgrid">'
    +kcard('Stressed NOI',f$(snoi2),'vs base '+f$(c.noi),snoi2>=0?80:20,snoi2>=0?'var(--ok)':'var(--bad)')
    +kcard('Stressed CF/mo',f$(scf2)+'/mo','vs base '+f$(c.moCF)+'/mo',scf2>=0?80:20,scf2>=0?'var(--ok)':'var(--bad)')
    +kcard('Stressed DSCR',fx(sdscr2),'vs base '+fx(c.dscr),Math.min(100,sdscr2/1.5*100),sdscr2>=1.25?'var(--ok)':sdscr2>=1?'var(--warn)':'var(--bad)')
    +kcard('Stressed Rate',fp$(+p.rate+sd.ri)+'%','vs base '+fp$(+p.rate)+'%',100,'var(--t2)')
    +'</div>'
    +'<div class="bres '+(ok2?'ok':warn2?'warn':'bad')+'"><span style="font-size:18px">'+(ok2?'✓':warn2?'⚠':'✗')+'</span><div><div style="font-weight:600">'+(ok2?'Deal survives — positive cash flow maintained':warn2?'Deal is marginal — thin cushion, build reserves':'Deal FAILS — negative cash flow in this scenario')+'</div><div style="font-size:12px;opacity:.85;margin-top:2px">Stressed CF: '+f$(scf2)+'/mo · Stressed DSCR: '+fx(sdscr2)+'</div></div></div>';
}
function kcard(l,v,s,pct,color){return '<div class="kcard"><div class="kcard-lbl">'+l+'</div><div class="kcard-val" style="color:'+color+'">'+v+'</div><div class="kcard-sub">'+s+'</div>'+pbar(pct,color)+'</div>';}

  const sel=props.filter(p=>cmpIds.has(p.id));
  const calcs=sel.map(p=>calc(p));
  const best=(fn,hi)=>{if(sel.length<2)return -1;let idx=0;sel.forEach((_,i)=>{if(hi?fn(calcs[i])>fn(calcs[idx]):fn(calcs[i])<fn(calcs[idx]))idx=i;});return idx;};
  const mets=[
    {l:'Purchase Price',f:c=>f$(c.price),b:best(c=>c.price,false)},
    {l:'Monthly Rent',f:(_,i)=>f$(+sel[i].rent)+'/mo'},
    {l:'Cap Rate',f:c=>fp$(c.capRate)+'%',b:best(c=>c.capRate,true),cls:c=>kcol(c.capRate,'cap')},
    {l:'Cash-on-Cash',f:c=>fp$(c.coc)+'%',b:best(c=>c.coc,true),cls:c=>kcol(c.coc,'coc')},
    {l:'NOI (Annual)',f:c=>f$(c.noi),b:best(c=>c.noi,true)},
    {l:'Cash Flow/mo',f:c=>f$(c.moCF)+'/mo',b:best(c=>c.moCF,true),cls:c=>kcol(c.moCF,'cf')},
    {l:'DSCR',f:c=>fx(c.dscr),b:best(c=>c.dscr,true),cls:c=>kcol(c.dscr,'dscr')},
    {l:'1% Rule',f:c=>fp$(c.pct1)+'%',b:best(c=>c.pct1,true),cls:c=>kcol(c.pct1,'p1')},
    {l:'GRM',f:c=>fx(c.grm,1),b:best(c=>c.grm,false),cls:c=>kcol(c.grm,'grm')},
    {l:'Total Cash In',f:c=>f$(c.cashIn),b:best(c=>c.cashIn,false)},
    {l:'Monthly Mortgage',f:c=>f$(c.mort)+'/mo'},
    {l:'Annual Depreciation',f:c=>f$(c.annDep),b:best(c=>c.annDep,true)},
    {l:'Deal Score',f:c=>c.sc+'/100',b:best(c=>c.sc,true),cls:c=>c.sc>=65?'ok':c.sc>=50?'warn':'bad'},
  ];
  return '<div class="ph"><h1>Deal <span>Comparison</span></h1></div>'
    +'<div class="csela"><h3>Select Properties <span style="font-size:12px;font-weight:400;color:var(--t3)">(up to 4)</span></h3>'
    +'<div class="cselg">'+props.map(p=>'<button class="cselbtn '+(cmpIds.has(p.id)?'on':'')+'" onclick="toggleCmp(\''+p.id+'\')">'+(p.address||'Untitled')+' <span style="color:var(--t3);font-size:11px">· '+f$(+p.purchasePrice||+p.listPrice)+'</span></button>').join('')+'</div></div>'
    +(sel.length<2?'<div class="empty" style="padding:40px"><div class="ei" style="font-size:30px">⧖</div><h3>Select 2+ properties</h3><p>Use selector above or + on cards.</p></div>':
    '<div class="ctblwrap"><table class="ctbl">'
    +'<thead><tr><th class="rl">Metric</th>'+sel.map(p=>'<th><div style="font-weight:700">'+(p.address||'Untitled')+'</div><div style="font-size:11px;font-weight:400;color:var(--t3)">'+stratL(p.strategy)+' · '+statL(p.status)+'</div></th>').join('')+'</tr></thead>'
    +'<tbody>'
    +'<tr><td class="secrow" colspan="'+(sel.length+1)+'">Property Details</td></tr>'
    +['type','units','beds','baths','sqft','yearBuilt'].map(k=>'<tr><td class="rl">'+{type:'Type',units:'Units',beds:'Beds',baths:'Baths',sqft:'Sq Ft',yearBuilt:'Year Built'}[k]+'</td>'+sel.map(p=>'<td class="mono">'+p[k]+'</td>').join('')+'</tr>').join('')
    +'<tr><td class="secrow" colspan="'+(sel.length+1)+'">Financial Metrics</td></tr>'
    +mets.map(m=>'<tr><td class="rl">'+m.l+'</td>'+sel.map((p,i)=>{const isBest=m.b===i;const cls=m.cls?m.cls(calcs[i]):'';return '<td class="mono '+cls+' '+(isBest?'best':'')+'">'+m.f(calcs[i],i)+'</td>';}).join('')+'</tr>').join('')
    +'</tbody></table></div>');
}

/* ─── TOOLS ─── */
function renderTools(){
  const td=toolD;
  const p2=td.tp||1,r2=td.tr||0,dn=td.td/100||.25,rt=td.ti/100/12||0,nn=(30)*12;
  const la=p2*(1-dn),m2=rt>0?la*rt*Math.pow(1+rt,nn)/(Math.pow(1+rt,nn)-1):la/nn;
  const ar=r2*12,v2=ar*.08,eg=ar-v2;
  const ox=td.ttx+td.ti2+(td.tm/100)*eg+(td.tcx*12);
  const no2=eg-ox,ad=m2*12,acf=(no2-ad)/12;
  const cpr=no2/p2*100,cc2=cashIn2()>0?acf*12/cashIn2()*100:0;
  const gr2=ar>0?p2/ar:0,op2=r2/p2*100,ds=ad>0?no2/ad:0;
  function cashIn2(){return p2*dn+p2*.03;}
  const vc=acf>=200&&cc2>=8?'ok':acf>=0&&cc2>=5?'warn':'bad';
  const rehabT=Object.values(rehab).reduce((a,b)=>a+(+b),0);
  return '<div class="ph"><h1>Investment <span>Tools</span></h1></div>'
    +'<div class="tgrid">'
    +'<div class="tcard"><h3>⊞ Quick Deal Calculator</h3><div class="tdesc">60-second pre-analysis before adding to portfolio.</div>'
    +tinp('Purchase Price ($)','tp',td.tp)+tinp('Monthly Rent ($)','tr',td.tr)+tinp('Down Payment (%)','td',td.td)+tinp('Interest Rate (%)','ti',td.ti)+tinp('Annual Taxes ($)','ttx',td.ttx)+tinp('Annual Insurance ($)','ti2',td.ti2)+tinp('Mgmt Fee (%)','tm',td.tm)+tinp('CapEx / mo ($)','tcx',td.tcx)
    +'<div class="divider"></div>'
    +tres('NOI / Year',f$(no2),no2>=0?'ok':'bad')+tres('Cash Flow / mo',f$(acf)+'/mo',acf>=200?'ok':acf>=0?'warn':'bad')+tres('Cap Rate',fp$(cpr)+'%',cpr>=6?'ok':cpr>=4?'warn':'bad')+tres('Cash-on-Cash',fp$(cc2)+'%',cc2>=8?'ok':cc2>=5?'warn':'bad')+tres('DSCR',fx(ds),ds>=1.25?'ok':ds>=1?'warn':'bad')+tres('GRM',fx(gr2,1),gr2<=8?'ok':gr2<=12?'warn':'bad')+tres('1% Rule',fp$(op2)+'%',op2>=1?'ok':op2>=.7?'warn':'bad')
    +'<div class="tverdict tv-'+vc+'">'+(acf>=200&&cc2>=8?'✓ Strong — consider adding to portfolio':acf>=0&&cc2>=5?'⚠ Marginal — negotiate price down':'✗ Fails minimum thresholds at current inputs')+'</div>'
    +'</div>'
    +'<div class="tcard"><h3>📐 Rules of Thumb</h3><div class="tdesc">Screening benchmarks — filters, not final decisions.</div>'
    +'<div class="rgrid">'
    +'<div class="ri"><div class="ri-name">1% Rule</div><div class="ri-val">≥ 1%</div><div class="ri-sub">Monthly rent / price</div></div>'
    +'<div class="ri"><div class="ri-name">2% Rule</div><div class="ri-val">≥ 2%</div><div class="ri-sub">C-class / BRRRR targets</div></div>'
    +'<div class="ri"><div class="ri-name">70% Rule</div><div class="ri-val">MAO</div><div class="ri-sub">ARV×70% − Rehab</div></div>'
    +'<div class="ri"><div class="ri-name">50% Rule</div><div class="ri-val">50%</div><div class="ri-sub">OpEx / Gross Rent</div></div>'
    +'<div class="ri"><div class="ri-name">$200/Door</div><div class="ri-val">$200</div><div class="ri-sub">Min CF / unit / mo</div></div>'
    +'<div class="ri"><div class="ri-name">GRM Target</div><div class="ri-val">&lt; 8</div><div class="ri-sub">Gross rent multiplier</div></div>'
    +'<div class="ri"><div class="ri-name">Cap Rate</div><div class="ri-val">5–10%</div><div class="ri-sub">NOI / Purchase price</div></div>'
    +'<div class="ri"><div class="ri-name">CoC Target</div><div class="ri-val">≥ 8%</div><div class="ri-sub">Annual levered yield</div></div>'
    +'<div class="ri"><div class="ri-name">DSCR Min</div><div class="ri-val">≥ 1.25</div><div class="ri-sub">NOI / Debt service</div></div>'
    +'<div class="ri"><div class="ri-name">BRRRR LTV</div><div class="ri-val">≤ 75%</div><div class="ri-sub">Total cost / ARV</div></div>'
    +'<div class="ri"><div class="ri-name">Vacancy Budget</div><div class="ri-val">5–10%</div><div class="ri-sub">Of gross rent</div></div>'
    +'<div class="ri"><div class="ri-name">CapEx Reserve</div><div class="ri-val">$100–200</div><div class="ri-sub">Per unit / month</div></div>'
    +'</div></div>'
    +'<div class="tcard"><h3>🏗 Rehab Cost Estimator</h3><div class="tdesc">Line-item scope with 20% contingency.</div>'
    +[['Foundation/Structure','foundation',15000],['Roof','roof',12000],['HVAC','hvac',7000],['Plumbing','plumbing',4000],['Electrical','electric',5000],['Kitchen','kitchen',12000],['Bathrooms','baths',4000],['Flooring','flooring',6000],['Paint (Int+Ext)','paint',3000],['Windows / Doors','windows',5000],['Landscaping','landscape',1500],['Demo / Haul-off','demo',2000],['Other / Misc','other',3000]].map(function(it){return '<div class="tr"><span class="trl">'+it[0]+' <span style="color:var(--t3);font-size:11px">est.'+f$(it[2])+'</span></span><input type="number" value="'+rehab[it[1]]+'" class="fi" style="width:85px;text-align:right;font-size:12px" oninput="rehab[\''+it[1]+'\']=+this.value;render()"></div>';}).join('')
    +'<div class="divider"></div>'
    +'<div class="tr"><span class="trl" style="font-weight:600">Base Total</span><span class="trv">'+f$(rehabT)+'</span></div>'
    +'<div class="tr"><span class="trl" style="font-weight:600">+20% Contingency</span><span class="trv warn">'+f$(rehabT*1.2)+'</span></div>'
    +'</div>'
    +'<div class="tcard"><h3>🏘 Property Class Guide</h3><div class="tdesc">Match strategy to risk tolerance and goals.</div>'
    +[['A','New / under 10yr, high income, prime location','4–6% cap · Appreciation play · Hard to cash flow','Low'],['B','10–30yr, middle income, decent schools','5–8% cap · Best CF + appreciation balance','Low-Med'],['C','30+ yr, working class, higher management','7–11% cap · BRRRR and Section 8 target','Med-High'],['D','Distressed, high crime, very high management burden','12%+ cap (if achievable) · Specialists only','Very High']].map(function(it){return '<div class="wfr" style="flex-direction:column;align-items:flex-start;gap:4px;padding:11px 13px"><div style="display:flex;gap:7px;align-items:center;width:100%"><span class="bg bg-strat" style="min-width:22px;justify-content:center">Class '+it[0]+'</span><span style="font-size:12px;font-weight:500;color:var(--t1)">'+it[1]+'</span><span class="bg bg-src" style="margin-left:auto">Risk: '+it[3]+'</span></div><div style="font-size:11px;color:var(--t3);padding-left:28px">'+it[2]+'</div></div>';}).join('')
    +'</div>'
    +'</div>';
}
function tinp(l,k,v){return '<div class="tr"><span class="trl">'+l+'</span><input type="number" value="'+v+'" class="fi" style="width:105px;text-align:right" oninput="toolD[\''+k+'\']=+this.value;render()"></div>';}
function tres(l,v,c){return '<div class="tr"><span class="trl" style="font-weight:500">'+l+'</span><span class="trv '+(c==='ok'?'ok':c==='warn'?'warn':c==='bad'?'bad':'')+'">'+v+'</span></div>';}

    +'<p style="font-size:13px;color:var(--t2);line-height:1.6">Select the right letter type below, customize it, and send. Update the deal status to <b style="color:var(--gold)">Offer Out</b> in DealVault to track it in your active pipeline.</p>'

    +'<div class="sh mt"><h3>Letter Templates</h3></div>'
    +'<div class="letter-tabs">'+letterTypes.map(t=>'<button class="ltab '+(activeLetter===t.id?'on':'')+'" onclick="activeLetter=\''+t.id+'\';render()">'+t.label+'</button>').join('')+'</div>'

/* ── URL PARSER — works 100% offline, no API needed ── */
function parseListingUrl(url){
  const d={address:'',city:'',state:'',zip:'',listingUrl:url,source:'MLS',confidence:'medium'};
  try{
    const zM=url.match(/homedetails\/([^/?]+)\/(\d+)_zpid/);
    if(zM){
      const parts=zM[1].split('-');
      let si=-1;
      for(let i=1;i<parts.length;i++){if(/^[A-Z]{2}$/.test(parts[i])){si=i;break;}}
      if(si>0&&si+1<parts.length&&/^\d{5}$/.test(parts[si+1])){
        d.state=parts[si];d.zip=parts[si+1];
        d.city=parts[si-1];
        d.address=parts.slice(0,si-1).join(' ');
        d.confidence='high';
      }
    }
    const rM=url.match(/redfin\.com\/([A-Z]{2})\/([^/]+)\/(.+?)-(\d{5})\/home/);
    if(rM){d.state=rM[1];d.city=rM[2].replace(/-/g,' ');d.address=rM[3].replace(/-/g,' ');d.zip=rM[4];d.confidence='high';}
    const rlM=url.match(/realestateandhomes-detail\/([^_]+)_([^_]+)_([A-Z]{2})_(\d{5})/);
    if(rlM){d.address=rlM[1].replace(/-/g,' ');d.city=rlM[2].replace(/-/g,' ');d.state=rlM[3];d.zip=rlM[4];d.confidence='high';}
    if(!d.state){const gM=url.match(/\/([A-Z]{2})\/[^/]*-(\d{5})[\/\-]/);if(gM){d.state=gM[1];d.zip=gM[2];}}
  }catch(e){console.warn('URL parse:',e);}
  return d;
}

function runURLImport(){
  const url=(document.getElementById('ai-url-input')||{}).value||'';
  const trimmed=url.trim();
  if(!trimmed){setAIStatus('error','Please paste a listing URL first.');return;}
  // Try AI fetch if inside Claude.ai (window.storage available = artifact context)
  const canUseAPI=typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function';
  if(canUseAPI){
    runAIFetchURL(trimmed);
  } else {
    // Offline URL parse only
    setAIStatus('thinking','Parsing URL…');
    const d=parseListingUrl(trimmed);
    if(!d.address&&!d.city&&!d.state){
      setAIStatus('error','Could not extract address. Try a Zillow or Redfin listing URL.');
      return;
    }
    setAIStatus('done','Address extracted from URL. Fill in price and property details below.');
    showAIResult({
      address:d.address,city:d.city,state:d.state,zip:d.zip,
      listingUrl:trimmed,source:'MLS',type:'SFR',units:1,
      beds:0,baths:0,sqft:0,yearBuilt:0,listPrice:0,rent:0,taxes:0,hoa:0,
      agentName:'',agentPhone:'',confidence:d.confidence,notes:''
    },trimmed);
  }
}

async function runAIFetchURL(url){
  setAIStatus('thinking','Claude is reading the listing page…');
  const prompt='You are a real estate data extraction assistant. I need you to extract property listing data from this URL: '+url+'\n\nFirst parse what you can from the URL itself (address, city, state, zip are often in Zillow/Redfin URLs). Then provide your best estimates for a typical property at this location. Respond ONLY with a JSON object — no markdown, no explanation:\n{"address":"","city":"","state":"","zip":"","type":"SFR","units":1,"beds":0,"baths":0,"sqft":0,"yearBuilt":0,"listPrice":0,"rent":0,"taxes":0,"hoa":0,"agentName":"","agentPhone":"","notes":"","source":"MLS","confidence":"medium"}\nFor type use only: SFR, Duplex, Triplex, Fourplex, "5+ Unit MFR", or Commercial.\nSet confidence to "high" only if you can read actual data from the URL structure. Use 0 for unknown numbers.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    if(!resp.ok){throw new Error('API '+resp.status);}
    const data=await resp.json();
    const text=(data.content||[]).map(function(i){return i.text||'';}).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    setAIStatus('done','Data extracted! Fill in any missing fields below.');
    showAIResult(parsed,url);
  }catch(err){
    // Fallback to URL parse
    const d=parseListingUrl(url);
    if(d.address||d.city){
      setAIStatus('done','Address extracted from URL. Fill in price and property details below.');
      showAIResult({
        address:d.address,city:d.city,state:d.state,zip:d.zip,
        listingUrl:url,source:'MLS',type:'SFR',units:1,
        beds:0,baths:0,sqft:0,yearBuilt:0,listPrice:0,rent:0,taxes:0,hoa:0,
        agentName:'',agentPhone:'',confidence:d.confidence,notes:''
      },url);
    } else {
      setAIStatus('error','Could not parse this URL. Paste a Zillow or Redfin listing URL and try again.');
    }
  }
}


function processImageFile(file){
  const reader=new FileReader();
  reader.onload=function(ev){
    const src=ev.target.result;
    const b64=src.split(',')[1];
    const prev=document.getElementById('img-previews');
    if(prev)prev.innerHTML='<img class="img-thumb" src="'+src+'" style="max-width:120px;border-radius:6px;border:1px solid var(--b)">';
    runAIImportImage(b64, file.type||'image/jpeg');
  };
  reader.readAsDataURL(file);
}

async function runAIImportImage(b64, mimeType){
  setAIStatus('thinking','Claude Vision is reading your screenshot…');
  const prompt='Extract all visible real estate listing data from this screenshot. Respond ONLY with valid JSON, no markdown:\n{"address":"","city":"","state":"","zip":"","type":"SFR","units":1,"beds":0,"baths":0,"sqft":0,"yearBuilt":0,"listPrice":0,"rent":0,"taxes":0,"hoa":0,"agentName":"","agentPhone":"","notes":"","source":"MLS","confidence":"high"}\ntype must be one of: SFR Duplex Triplex Fourplex "5+ Unit MFR" Commercial. Use 0 for numbers not visible.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-6',max_tokens:700,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mimeType,data:b64}},{type:'text',text:prompt}]}]})
    });
    if(!resp.ok){
      const errData=await resp.json().catch(function(){return {};});
      const msg=errData.error?errData.error.message:('HTTP '+resp.status);
      // 401 means no key injected (running locally as file://)
      if(resp.status===401){
        setAIStatus('error','Screenshot AI requires an API key when running locally. Use the URL import above, or open this file through a web server. Inside Claude.ai this works automatically.');
      } else {
        setAIStatus('error','API error: '+msg);
      }
      return;
    }
    const data=await resp.json();
    const text=(data.content||[]).map(function(i){return i.text||'';}).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    setAIStatus('done','All visible data extracted from screenshot!');
    showAIResult(parsed, null);
  }catch(err){
    if(err.message&&(err.message.includes('Failed to fetch')||err.message.includes('NetworkError')||err.message.includes('CORS'))){
      setAIStatus('error','Browser blocked the request (CORS restriction on local files). The screenshot feature works automatically inside Claude.ai. For local use, try the URL import instead.');
    } else {
      setAIStatus('error','Error: '+err.message);
    }
  }
}

    +'<div class="fg"><label class="flbl">Down Payment (%)</label>'+inp2('downPct','0.5')+'</div>'
    +'<div class="fg"><label class="flbl">Interest Rate (%)</label>'+inp2('rate','0.125')+'</div>'
    +'<div class="fg"><label class="flbl">Loan Term (years)</label>'+inp2('term')+'</div>'
    +'<div class="fsec"><div class="fsec-title">🔨 BRRRR / Rehab</div></div>'
    +'<div class="fg"><label class="flbl">After Repair Value ($)</label>'+inp2('arv')+'</div>'
    +'<div class="fg"><label class="flbl">Est. Rehab Cost ($)</label>'+inp2('rehab')+'</div>'
    +'<div class="fg"><label class="flbl">Hard Money Rate (%)</label>'+inp2('hmRate')+'</div>'
    +'<div class="fg"><label class="flbl">Hard Money Points</label>'+inp2('hmPts','0.5')+'</div>'
    +'<div class="fg"><label class="flbl">Holding Period (months)</label>'+inp2('holdMo')+'</div>'
    +'<div class="fsec"><div class="fsec-title">📈 Appreciation Assumptions</div></div>'
    +'<div class="fg"><label class="flbl">Annual Appreciation (%)</label>'+inp2('appRate','0.5')+'</div>'
    +'<div class="fg"><label class="flbl">Annual Rent Growth (%)</label>'+inp2('rentGr','0.5')+'</div>'
    +'<div class="fsec"><div class="fsec-title">📋 Notes</div></div>'
    +'<div class="fg full"><label class="flbl">General Notes</label><textarea class="fta" data-f="notes">'+(p.notes||'')+'</textarea></div>'
    +'<div class="fg full"><label class="flbl">Seller / Motivation Notes</label><textarea class="fta" data-f="motivNotes">'+(p.motivNotes||'')+'</textarea></div>'
    +'<div class="fg full"><label class="flbl">Offer Notes</label><textarea class="fta" data-f="offerNotes">'+(p.offerNotes||'')+'</textarea></div>'
    +'<div class="flive" id="flive">'
    +fli('NOI/yr',f$(c.noi),c.noi>=0?'var(--ok)':'var(--bad)')
    +fli('CF/mo',f$(c.moCF)+'/mo',c.moCF>=200?'var(--ok)':c.moCF>=0?'var(--warn)':'var(--bad)')
    +fli('Cap Rate',fp$(c.capRate)+'%',c.capRate>=6?'var(--ok)':c.capRate>=4?'var(--warn)':'var(--bad)')
    +fli('CoC',fp$(c.coc)+'%',c.coc>=8?'var(--ok)':c.coc>=5?'var(--warn)':'var(--bad)')
    +fli('DSCR',fx(c.dscr),c.dscr>=1.25?'var(--ok)':c.dscr>=1?'var(--warn)':'var(--bad)')
    +fli('Score',c.sc+'/100',scColor(c.sc))
    +'</div>'
    +'</div>'
    +'<div class="mfoot"><button class="btn btn-ghost" onclick="closeMod()">Cancel</button><button class="btn btn-gold" onclick="doSave()">'+(isEdit?'Save Changes':'Add to Portfolio')+'</button></div>';
}
function fli(l,v,c){return '<div><div class="fli-lbl">'+l+'</div><div class="fli-val" style="color:'+c+'">'+v+'</div></div>';}

function bindMod(){
  document.querySelectorAll('[data-f]').forEach(function(el){
    el.addEventListener('input',function(){
      if(!editP)return;
      const f=el.dataset.f;
      editP[f]=el.type==='number'?(parseFloat(el.value)||0):el.value;
      const c2=calc(editP);
      const live=document.getElementById('flive');
      if(live)live.innerHTML=fli('NOI/yr',f$(c2.noi),c2.noi>=0?'var(--ok)':'var(--bad)')+fli('CF/mo',f$(c2.moCF)+'/mo',c2.moCF>=200?'var(--ok)':c2.moCF>=0?'var(--warn)':'var(--bad)')+fli('Cap Rate',fp$(c2.capRate)+'%',c2.capRate>=6?'var(--ok)':c2.capRate>=4?'var(--warn)':'var(--bad)')+fli('CoC',fp$(c2.coc)+'%',c2.coc>=8?'var(--ok)':c2.coc>=5?'var(--warn)':'var(--bad)')+fli('DSCR',fx(c2.dscr),c2.dscr>=1.25?'var(--ok)':c2.dscr>=1?'var(--warn)':'var(--bad)')+fli('Score',c2.sc+'/100',scColor(c2.sc));
    });
  });
}

/* ─── ACTIONS ─── */
async function doSave(){
  if(!editP)return;
  if(!editP.address.trim()&&!confirm('Save without an address?'))return;
  const idx=props.findIndex(x=>x.id===editP.id);
  if(idx>=0)props[idx]={...editP};else props.unshift({...editP});
  await saveP(editP);
  closeMod();render();
}

async function doDelete(id){
  if(!confirm('Delete this property? Cannot be undone.'))return;
  props=props.filter(p=>p.id!==id);
  cmpIds.delete(id);
  await delP(id);
  if(view==='detail'&&activeId===id){view='portfolio';activeId=null;}
  render();
}

function toggleCmp(id){
  if(cmpIds.has(id)){cmpIds.delete(id);}
  else if(cmpIds.size<4){cmpIds.add(id);}
  else{alert('Max 4 properties.');return;}
  render();
}

async function toggleDD(propId,itemId){
  if(!ddState[propId])ddState[propId]={};
  ddState[propId][itemId]=!ddState[propId][itemId];
  await saveDD(propId,ddState[propId]);render();
}

async function clearDD(propId){
  ddState[propId]={};await saveDD(propId,{});render();
}

function promoteStage(id){
  const p=props.find(x=>x.id===id);if(!p)return;
  const order=['uploaded','prospect','analyzing','offer-out','under-contract','deal','monitoring'];
  const idx=order.indexOf(p.status);
  if(idx>=0&&idx<order.length-1){p.status=order[idx+1];saveP(p);render();}
}

/* ─── INIT ─── */
async function init(){
  try{
    props=await loadAll();
    if(props.length===0){for(const p of SAMPLES)await saveP(p);props=[...SAMPLES];}
    for(const p of props)ddState[p.id]=await loadDD(p.id);
  }catch(e){console.warn('Storage init failed:',e);props=[...SAMPLES];}
  render();
}
init();
