<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealVault · RE Investment Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090e1a;--bg1:#0d1525;--bg2:#111d32;--bg3:#172440;--bg4:#1e2e4e;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.11);--b3:rgba(255,255,255,0.18);
  --t1:#e0eaff;--t2:#8096be;--t3:#415070;
  --gold:#f5a623;--gold2:rgba(245,166,35,0.15);--gold3:rgba(245,166,35,0.07);
  --ok:#1ec88a;--ok2:rgba(30,200,138,0.13);
  --warn:#f0c040;--warn2:rgba(240,192,64,0.13);
  --bad:#ff4d5e;--bad2:rgba(255,77,94,0.13);
  --info:#4d8ef5;--info2:rgba(77,142,245,0.13);
  --r:8px;--r2:12px;--r3:16px;
  --mono:'JetBrains Mono',monospace;
  --head:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --sh:0 4px 28px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--body);font-size:14px;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,14,26,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--b);height:56px;display:flex;align-items:center;padding:0 20px;gap:12px}
.logo{font-family:var(--head);font-size:22px;font-weight:700;letter-spacing:.5px;white-space:nowrap;margin-right:4px}
.logo span{color:var(--gold)}
.nav-sep{width:1px;height:22px;background:var(--b2);flex-shrink:0}
.nb{background:none;border:none;color:var(--t2);font-family:var(--body);font-size:13px;font-weight:500;padding:6px 11px;border-radius:var(--r);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nb:hover{color:var(--t1);background:var(--bg3)}
.nb.active{color:var(--gold);background:var(--gold3)}
.nc{background:var(--bg4);color:var(--t3);font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:20px}
.nav-r{margin-left:auto;display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--r);font-family:var(--body);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;text-decoration:none}
.btn-gold{background:var(--gold);color:#090e1a;font-weight:600}
.btn-gold:hover{background:#ffb840;transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,166,35,0.3)}
.btn-ghost{background:none;border:1px solid var(--b2);color:var(--t2)}
.btn-ghost:hover{border-color:var(--b3);color:var(--t1);background:var(--bg3)}
.btn-danger{background:none;border:1px solid rgba(255,77,94,0.25);color:var(--bad)}
.btn-danger:hover{background:var(--bad2);border-color:var(--bad)}
.btn-ok{background:var(--ok2);border:1px solid rgba(30,200,138,0.25);color:var(--ok)}
.btn-sm{padding:5px 10px;font-size:12px}

/* MAIN */
.main{padding-top:56px;min-height:100vh}
.page{padding:20px;max-width:1400px;margin:0 auto}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px}
.spin{width:36px;height:36px;border:2px solid var(--bg3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--head);font-size:20px;font-weight:600;color:var(--t3);letter-spacing:1px}

/* PORTFOLIO HEADER */
.ph{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.ph h1{font-family:var(--head);font-size:30px;font-weight:700;letter-spacing:.5px}
.ph h1 span{color:var(--gold)}

/* PORTFOLIO STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:18px}
.stat-chip{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px}
.stat-chip-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px}
.stat-chip-val{font-family:var(--mono);font-size:16px;font-weight:500}

/* FILTERS */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.fb{background:none;border:1px solid var(--b);color:var(--t3);font-family:var(--body);font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .15s}
.fb:hover{border-color:var(--b2);color:var(--t2)}
.fb.on{border-color:var(--gold);color:var(--gold);background:var(--gold3)}
.sw{position:relative;min-width:180px;max-width:280px}
.sw input{width:100%;background:var(--bg2);border:1px solid var(--b);color:var(--t1);padding:6px 10px 6px 28px;border-radius:var(--r);font-family:var(--body);font-size:12px;outline:none;transition:border .15s}
.sw input:focus{border-color:var(--b2)}
.sw input::placeholder{color:var(--t3)}
.sw-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.sort-sel{background:var(--bg2);border:1px solid var(--b);color:var(--t2);padding:5px 9px;border-radius:var(--r);font-family:var(--body);font-size:12px;cursor:pointer;outline:none}

/* PROPERTY GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.empty{text-align:center;padding:80px 20px;color:var(--t3)}
.empty .ei{font-size:44px;margin-bottom:14px;opacity:.35}
.empty h3{font-family:var(--head);font-size:22px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty p{font-size:13px;max-width:300px;margin:0 auto 18px;line-height:1.6}

/* PROPERTY CARD */
.pcard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;transition:all .18s;position:relative}
.pcard:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:var(--sh)}
.pcard.cmp{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.ctop{padding:14px 16px 12px;border-bottom:1px solid var(--b)}
.cbadges{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.bg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;font-family:var(--head);text-transform:uppercase}
.bg-strat{background:var(--info2);color:var(--info)}
.bg-lead{background:var(--bg3);color:var(--t3)}
.bg-analyzing{background:var(--warn2);color:var(--warn)}
.bg-offer{background:rgba(155,121,245,0.15);color:#a88af5}
.bg-contract{background:var(--info2);color:var(--info)}
.bg-closed{background:var(--ok2);color:var(--ok)}
.bg-monitoring{background:var(--ok2);color:var(--ok)}
.bg-archived{background:var(--bg3);color:var(--t3)}
.bg-src{background:var(--bg3);color:var(--t3)}
.cadr{font-family:var(--head);font-size:19px;font-weight:700;color:var(--t1);line-height:1.2;margin-bottom:3px}
.cmeta{font-size:11px;color:var(--t3);line-height:1.5}
.cprice{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--t1);margin-top:7px}
.cprice span{font-size:12px;color:var(--t3);font-weight:400}
.ckpis{padding:11px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.kc{text-align:center}
.klbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:2px}
.kval{font-family:var(--mono);font-size:13px;font-weight:500}
.kval.ok{color:var(--ok)}.kval.warn{color:var(--warn)}.kval.bad{color:var(--bad)}.kval.n{color:var(--t1)}
.cscore{padding:9px 16px;display:flex;align-items:center;gap:9px;border-top:1px solid var(--b)}
.cstk{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.csfill{height:100%;border-radius:2px;transition:width .4s}
.csnum{font-family:var(--mono);font-size:12px;font-weight:600;min-width:28px;text-align:right}
.csverd{font-size:11px;font-weight:700;font-family:var(--head)}
.cacts{padding:9px 16px;display:flex;gap:6px;border-top:1px solid var(--b)}
.cacts .btn{flex:1;justify-content:center;font-size:11px;padding:6px 8px}
.ctog{position:absolute;top:11px;right:11px;width:22px;height:22px;border-radius:5px;border:1.5px solid var(--b2);background:rgba(0,0,0,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;z-index:2;color:var(--t3)}
.ctog:hover{border-color:var(--gold);color:var(--gold)}
.ctog.on{background:var(--gold);border-color:var(--gold);color:#090e1a;font-weight:700}

/* DETAIL */
.back-btn{background:none;border:none;color:var(--t3);font-size:13px;font-family:var(--body);cursor:pointer;display:flex;align-items:center;gap:5px;padding:0 0 8px;transition:color .15s}
.back-btn:hover{color:var(--t1)}
.dtitle{font-family:var(--head);font-size:34px;font-weight:700;line-height:1.2}
.dmeta{font-size:13px;color:var(--t2);margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dmeta .sep{color:var(--t3)}
.dacts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--b);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:none;border:none;color:var(--t3);font-family:var(--body);font-size:13px;font-weight:500;padding:10px 15px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* KPI CARDS */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:18px}
.kcard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:13px 15px}
.kcard-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kcard-val{font-family:var(--mono);font-size:21px;font-weight:500;line-height:1.2}
.kcard-sub{font-size:11px;color:var(--t3);margin-top:3px}
.kcard-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.kcard-bar-fill{height:100%;border-radius:2px;opacity:.7}

/* SCORE CARD */
.scard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:20px;margin-bottom:18px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.sbig{text-align:center;min-width:110px}
.sbig-num{font-family:var(--mono);font-size:60px;font-weight:500;line-height:1}
.sbig-lbl{font-size:11px;color:var(--t3);margin-top:2px}
.sbig-verd{font-family:var(--head);font-size:15px;font-weight:700;margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.sbdown{flex:1;min-width:200px}
.sbdown-title{font-size:10px;color:var(--t3);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sbrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sbrow-lbl{font-size:12px;color:var(--t2);min-width:140px}
.sbrow-trk{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.sbrow-fill{height:100%;border-radius:2px}
.sbrow-val{font-family:var(--mono);font-size:11px;min-width:50px;text-align:right}

/* WATERFALL */
.wf{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.wfr{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--b);transition:background .1s;gap:8px}
.wfr:last-child{border:none}
.wfr:hover{background:var(--bg2)}
.wfr.tot{background:var(--bg2)}
.wfl{flex:1;font-size:13px;color:var(--t2)}
.wfl.ind{padding-left:14px;font-size:12px;color:var(--t3)}
.wfl.str{color:var(--t1);font-weight:600}
.wfv{font-family:var(--mono);font-size:13px;font-weight:500;min-width:110px;text-align:right}
.wfv.ok{color:var(--ok)}.wfv.bad{color:var(--bad)}.wfv.n{color:var(--t1)}.wfv.dim{color:var(--t3)}

/* BRRRR */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.bc{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r);padding:13px}
.bc h4{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:7px}
.bc .bv{font-family:var(--mono);font-size:20px;font-weight:500}
.bc .bs{font-size:11px;color:var(--t3);margin-top:3px}
.bres{padding:12px 15px;border-radius:var(--r);margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.5}
.bres.ok{background:var(--ok2);border:1px solid rgba(30,200,138,0.25)}
.bres.warn{background:var(--warn2);border:1px solid rgba(240,192,64,0.25)}
.bres.bad{background:var(--bad2);border:1px solid rgba(255,77,94,0.25)}

/* STRESS */
.sctrl{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.sctrl h3{font-family:var(--head);font-size:18px;font-weight:600;margin-bottom:14px}
.sr{display:grid;grid-template-columns:180px 1fr 65px;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--b)}
.sr:last-child{border:none}
.sr-lbl{font-size:13px;color:var(--t2)}
.sr input[type=range]{width:100%;accent-color:var(--gold);cursor:pointer;height:4px}
.sr-val{font-family:var(--mono);font-size:12px;font-weight:500;text-align:right;color:var(--t1)}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.preset{background:var(--bg3);border:1px solid var(--b);color:var(--t2);font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:var(--body);transition:all .15s}
.preset:hover{border-color:var(--b2);color:var(--t1)}

/* HOLDING TABLE */
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{text-align:left;padding:9px 11px;color:var(--t3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b)}
.htbl td{padding:9px 11px;border-bottom:1px solid var(--b);font-family:var(--mono)}
.htbl tr:hover td{background:var(--bg2)}
.htbl tr:last-child td{border:none}
.htbl .hl td{background:rgba(245,166,35,0.05)}

/* DD */
.ddsec{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:18px;margin-bottom:12px}
.ddsec h3{font-family:var(--head);font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.ddi{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--b);cursor:pointer;transition:opacity .1s}
.ddi:last-child{border:none}
.ddi:hover{opacity:.85}
.ddcb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--b2);background:var(--bg2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.ddcb.chk{background:var(--ok);border-color:var(--ok);color:#090e1a;font-weight:700}
.ddt{flex:1;font-size:12px;color:var(--t2);line-height:1.4}
.ddt.chk{color:var(--t3);text-decoration:line-through}
.ddsev{font-size:10px;padding:1px 6px;border-radius:3px;font-family:var(--head);font-weight:700;flex-shrink:0}
.sev-h{background:var(--bad2);color:var(--bad)}.sev-m{background:var(--warn2);color:var(--warn)}.sev-l{background:var(--bg3);color:var(--t3)}
.ddprog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:16px}
.ddpfill{height:100%;background:var(--ok);border-radius:3px;transition:width .3s}

/* EXIT */
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.ec{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:16px}
.ec h3{font-family:var(--head);font-size:17px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.ei{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--b);font-size:12px}
.ei:last-child{border:none}
.ek{color:var(--t3);min-width:72px;font-weight:500;flex-shrink:0}
.ev{color:var(--t2);flex:1;line-height:1.4}

/* COMPARE */
.csela{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:15px;margin-bottom:18px}
.csela h3{font-family:var(--head);font-size:17px;font-weight:600;margin-bottom:11px}
.cselg{display:flex;flex-wrap:wrap;gap:6px}
.cselbtn{background:var(--bg3);border:1px solid var(--b);color:var(--t2);font-size:12px;padding:6px 11px;border-radius:var(--r);cursor:pointer;transition:all .15s;font-family:var(--body)}
.cselbtn:hover{border-color:var(--b2);color:var(--t1)}
.cselbtn.on{border-color:var(--gold);color:var(--gold);background:var(--gold3)}
.ctblwrap{overflow-x:auto;border-radius:var(--r2)}
.ctbl{width:100%;border-collapse:collapse;min-width:500px}
.ctbl th,.ctbl td{padding:9px 13px;border:1px solid var(--b);text-align:center;font-size:12px}
.ctbl th{background:var(--bg2);font-family:var(--head);font-size:12px;font-weight:600;letter-spacing:.3px;color:var(--t2)}
.ctbl .rl{background:var(--bg2);text-align:left;color:var(--t2);font-weight:500;width:150px}
.ctbl .secrow td{background:var(--bg3);color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;padding:5px 13px;text-align:left}
.ctbl .best{color:var(--ok);font-weight:600}

/* TOOLS */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.tcard{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);padding:18px}
.tcard h3{font-family:var(--head);font-size:19px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.tdesc{font-size:12px;color:var(--t3);margin-bottom:14px}
.tr{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b)}
.tr:last-child{border:none}
.trl{flex:1;font-size:13px;color:var(--t2)}
.trv{font-family:var(--mono);font-size:14px;font-weight:500;min-width:100px;text-align:right}
.tverdict{padding:9px 13px;border-radius:var(--r);font-size:13px;font-weight:500;margin-top:11px;text-align:center}
.tv-ok{background:var(--ok2);color:var(--ok)}
.tv-warn{background:var(--warn2);color:var(--warn)}
.tv-bad{background:var(--bad2);color:var(--bad)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:10px}
.ri{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
.ri-name{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.ri-val{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--gold)}
.ri-sub{font-size:11px;color:var(--t3);margin-top:2px}

/* MODAL */
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px}
.mbox{background:var(--bg1);border:1px solid var(--b2);border-radius:var(--r3);width:100%;max-width:840px;margin:auto;box-shadow:var(--sh);animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.mhdr{padding:18px 22px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px}
.mhdr h2{font-family:var(--head);font-size:22px;font-weight:700;flex:1}
.mbody{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:0 22px;max-height:72vh;overflow-y:auto}
.fsec{grid-column:1/-1;margin:16px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--b)}
.fsec:first-child{margin-top:0}
.fsec-title{font-family:var(--head);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.5px;text-transform:uppercase}
.fg{margin-bottom:10px}
.fg.full{grid-column:1/-1}
.flbl{display:block;font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fi,.fsel,.fta{width:100%;background:var(--bg3);border:1px solid var(--b);color:var(--t1);padding:7px 11px;border-radius:var(--r);font-family:var(--body);font-size:13px;outline:none;transition:border .15s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--gold)}
.fi::placeholder,.fta::placeholder{color:var(--t3)}
.fsel option{background:var(--bg2)}
.fta{resize:vertical;min-height:72px}
.fhint{font-size:10px;color:var(--t3);margin-top:3px}
.flive{background:var(--bg2);border-radius:var(--r);padding:12px 14px;margin-top:14px;grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;border:1px solid var(--b)}
.fli-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.fli-val{font-family:var(--mono);font-size:14px;font-weight:500}
.mfoot{padding:14px 22px;border-bottom:1px solid var(--b);display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--b);border-bottom:none}

/* NOTICE */
.notice{background:var(--info2);border:1px solid rgba(77,142,245,0.2);border-radius:var(--r);padding:9px 13px;font-size:12px;color:var(--info);margin-bottom:14px;line-height:1.5}
.notice-warn{background:var(--warn2);border-color:rgba(240,192,64,0.25);color:var(--warn)}

/* UTILS */
.divider{height:1px;background:var(--b);margin:14px 0}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sh h3{font-family:var(--head);font-size:18px;font-weight:600}
.mt{margin-top:14px}.mt8{margin-top:8px}
.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}.gold{color:var(--gold)}.dim{color:var(--t3)}.mono{font-family:var(--mono)}
@media(max-width:700px){
  .two,.three{grid-template-columns:1fr}
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .pgrid{grid-template-columns:1fr}
  .mbody{grid-template-columns:1fr}
  .sr{grid-template-columns:140px 1fr 55px}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo">Deal<span>Vault</span></div>
  <div class="nav-sep"></div>
  <button class="nb active" id="nb-portfolio" onclick="nav('portfolio')">⊞ Portfolio <span class="nc" id="pc">0</span></button>
  <button class="nb" id="nb-compare" onclick="nav('compare')">⧖ Compare</button>
  <button class="nb" id="nb-tools" onclick="nav('tools')">⚙ Tools</button>
  <div class="nav-r">
    <button class="btn btn-ghost btn-sm" id="clrbtn" onclick="cmpIds.clear();render()" style="display:none">Clear Compare</button>
    <button class="btn btn-gold" onclick="openAdd()">+ Add Deal</button>
  </div>
</nav>

<div class="main"><div class="page" id="app"><div class="loading"><div class="spin"></div><div class="loading-text">Loading DealVault…</div></div></div></div>

<div class="mover" id="mover" onclick="if(event.target===this)closeMod()"><div class="mbox" id="mbox"></div></div>

<script>
'use strict';
/* ── STATE ── */
let props=[], view='portfolio', activeId=null, dtab='overview', editP=null, cmpIds=new Set();
let fStat='all', fStrat='all', q='', sortBy='score';
let ddState={}, stressD={rd:0,vi:8,ri:0,ei:0,cx:0};
let toolD={tp:200000,tr:2000,td:25,ti:7,ttx:2400,ti2:1200,tm:10,tcx:150};
let rehab={foundation:0,roof:0,hvac:5000,plumbing:2000,electric:3000,kitchen:8000,baths:3000,flooring:4000,paint:2000,windows:0,landscape:500,demo:1000,other:0};

/* ── STORAGE ── */
async function sGet(k){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null}catch{return null}}
async function sSet(k,v){try{await window.storage.set(k,JSON.stringify(v))}catch(e){console.warn('Storage set failed',e)}}
async function sDel(k){try{await window.storage.delete(k)}catch{}}
async function sList(pfx){try{const r=await window.storage.list(pfx);return r?.keys||[]}catch{return[]}}
async function loadAll(){const ks=await sList('p:');const a=[];for(const k of ks){const p=await sGet(k);if(p)a.push(p);}return a.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));}
async function saveP(p){await sSet('p:'+p.id,p);}
async function delP(id){await sDel('p:'+id);}
async function loadDD(id){return await sGet('dd:'+id)||{};}
async function saveDD(id,d){await sSet('dd:'+id,d);}

/* ── DEFAULTS ── */
function mkProp(o={}){
  return{id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
  createdAt:new Date().toISOString(),address:'',city:'',state:'',zip:'',
  type:'SFR',units:1,beds:3,baths:2,sqft:1200,yearBuilt:2000,listingUrl:'',
  strategy:'buy-hold',status:'analyzing',source:'MLS',
  listPrice:200000,offerPrice:0,purchasePrice:200000,closingPct:3,
  rent:2000,otherIncome:0,vacRate:8,mgmtPct:10,
  taxes:2400,ins:1200,hoa:0,maint:120,capex:150,utils:0,
  downPct:25,rate:7.0,term:30,
  arv:0,rehab:0,hmRate:12,hmPts:2,holdMo:6,
  appRate:3.5,rentGr:2.5,fmr:0,motivScore:0,notes:'',motivNotes:'',...o};
}

/* ── CALCULATIONS ── */
function calc(p){
  const price=Math.max(1,+p.purchasePrice||+p.listPrice||1);
  const units=Math.max(1,+p.units||1);
  const grossRent=(+p.rent*units + +p.otherIncome)*12;
  const vacLoss=grossRent*((+p.vacRate)/100);
  const egi=grossRent-vacLoss;
  const mgmt=egi*((+p.mgmtPct)/100);
  const opex=+p.taxes + +p.ins + +p.hoa*12 + +p.maint*12 + +p.capex*12 + +p.utils*12 + mgmt;
  const noi=egi-opex;
  const oer=egi>0?opex/egi*100:0;
  const downAmt=price*((+p.downPct)/100);
  const closing=price*((+p.closingPct)/100);
  const loan=price-downAmt;
  const r=(+p.rate)/100/12;
  const n=(+p.term)*12;
  const mort=r>0?loan*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):loan/(n||360);
  const annDebt=mort*12;
  const annCF=noi-annDebt;
  const moCF=annCF/12;
  const cashIn=downAmt+closing+(p.strategy==='BRRRR'?+p.rehab:0);
  const capRate=noi/price*100;
  const coc=cashIn>0?annCF/cashIn*100:0;
  const grm=grossRent>0?price/grossRent:0;
  const dscr=annDebt>0?noi/annDebt:0;
  const pct1=price>0?+p.rent/price*100:0;
  // BRRRR
  const arv=+p.arv||0;
  const rehabC=+p.rehab||0;
  const mao70=arv>0?arv*0.70-rehabC:0;
  const totalProj=price+rehabC;
  const refi75=arv*0.75;
  const cashRecov=refi75-totalProj;
  const hmCost=price*0.9*((+p.hmRate)/100)*((+p.holdMo)/12)+price*0.9*((+p.hmPts)/100);
  // Depreciation
  const depBase=price*0.80;
  const annDep=depBase/27.5;
  // Score
  let sc=0;
  if(coc>=12)sc+=20;else if(coc>=8)sc+=14;else if(coc>=5)sc+=7;else if(coc>=0)sc+=2;
  if(capRate>=8)sc+=15;else if(capRate>=6)sc+=10;else if(capRate>=4)sc+=5;
  if(moCF>=400)sc+=15;else if(moCF>=200)sc+=10;else if(moCF>=0)sc+=5;
  if(dscr>=1.5)sc+=15;else if(dscr>=1.25)sc+=10;else if(dscr>=1.0)sc+=5;
  if(pct1>=1.5)sc+=10;else if(pct1>=1.0)sc+=6;else if(pct1>=0.7)sc+=3;
  if(+p.motivScore>=60)sc+=15;else if(+p.motivScore>=30)sc+=8;else if(+p.motivScore>=10)sc+=3;
  if(units>=4)sc+=10;else if(units>=2)sc+=5;
  sc=Math.min(100,Math.max(0,Math.round(sc)));
  return{price,grossRent,vacLoss,egi,mgmt,opex,noi,oer,downAmt,closing,loan,mort,annDebt,annCF,moCF,cashIn,capRate,coc,grm,dscr,pct1,mao70,totalProj,refi75,cashRecov,hmCost,depBase,annDep,arv,rehabC,sc};
}
function scColor(s){return s>=80?'var(--ok)':s>=65?'#6dd98c':s>=50?'var(--warn)':'var(--bad)';}
function scVerdict(s){return s>=80?'Elite Deal':s>=65?'Strong Deal':s>=50?'Marginal':'Pass';}
function kcol(v,t){
  if(t==='coc')return v>=8?'ok':v>=5?'warn':'bad';
  if(t==='cap')return v>=6?'ok':v>=4?'warn':'bad';
  if(t==='cf')return v>=200?'ok':v>=0?'warn':'bad';
  if(t==='dscr')return v>=1.25?'ok':v>=1.0?'warn':'bad';
  if(t==='p1')return v>=1.0?'ok':v>=0.7?'warn':'bad';
  if(t==='grm')return v<=8?'ok':v<=12?'warn':'bad';
  return 'n';
}
function kcolHex(v,t){const c=kcol(v,t);return c==='ok'?'var(--ok)':c==='warn'?'var(--warn)':'var(--bad)';}
function f$(n){if(n===undefined||n===null||isNaN(n))return'—';const a=Math.abs(n),s=n<0?'−':'';if(a>=1e6)return s+'$'+(a/1e6).toFixed(1)+'M';return s+'$'+Math.round(a).toLocaleString();}
function fp(n,d=1){return isNaN(n)?'—':n.toFixed(d)+'%';}
function fx(n,d=2){return isNaN(n)?'—':n.toFixed(d)+'x';}
function pbar(pct,color){return `<div class="kcard-bar"><div class="kcard-bar-fill" style="width:${Math.min(100,Math.max(0,pct))}%;background:${color}"></div></div>`;}

/* ── HOLDING PERIOD ── */
function holdRows(p,c){
  const rows=[];
  const r=(+p.rate)/100/12, n=(+p.term)*12;
  for(const yr of[1,3,5,7,10,15,20]){
    let bal=c.loan;
    for(let m=0;m<yr*12;m++){const i=bal*r,pr=c.mort-i;bal=Math.max(0,bal-pr);}
    const val=c.price*Math.pow(1+(+p.appRate)/100,yr);
    const eq=val-bal;
    const cf=c.annCF*yr*(1+(+p.rentGr)/100*yr/2);
    rows.push({yr,val,bal,eq,pp:c.loan-bal,appG:val-c.price,cf,tw:eq-c.downAmt-c.closing+cf});
  }
  return rows;
}

/* ── NAVIGATE ── */
function nav(v,id=null,tab='overview'){
  view=v;if(id)activeId=id;if(tab)dtab=tab;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('nb-'+v);if(el)el.classList.add('active');
  render();window.scrollTo(0,0);
}

/* ── RENDER MAIN ── */
function render(){
  const app=document.getElementById('app');
  try{
    if(view==='portfolio')app.innerHTML=renderPortfolio();
    else if(view==='detail')app.innerHTML=renderDetail();
    else if(view==='compare')app.innerHTML=renderCompare();
    else if(view==='tools')app.innerHTML=renderTools();
  }catch(e){console.error('Render error:',e);app.innerHTML=`<div class="empty"><h3>Render Error</h3><p>${e.message}</p></div>`;}
  document.getElementById('pc').textContent=props.length;
  document.getElementById('clrbtn').style.display=cmpIds.size>0?'flex':'none';
  const si=document.getElementById('srch');
  if(si)si.addEventListener('input',e=>{q=e.target.value;render();});
}

/* ── PORTFOLIO ── */
function renderPortfolio(){
  let fp=[...props];
  if(fStat!=='all')fp=fp.filter(p=>p.status===fStat);
  if(fStrat!=='all')fp=fp.filter(p=>p.strategy===fStrat);
  if(q)fp=fp.filter(p=>(p.address+' '+p.city+' '+p.state).toLowerCase().includes(q.toLowerCase()));
  if(sortBy==='score')fp.sort((a,b)=>calc(b).sc-calc(a).sc);
  else if(sortBy==='cf')fp.sort((a,b)=>calc(b).moCF-calc(a).moCF);
  else if(sortBy==='cap')fp.sort((a,b)=>calc(b).capRate-calc(a).capRate);
  else if(sortBy==='price')fp.sort((a,b)=>b.purchasePrice-a.purchasePrice);
  else fp.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  // Portfolio stats
  const allC=props.map(p=>calc(p));
  const totVal=props.reduce((s,p)=>s+(+p.purchasePrice||0),0);
  const totCF=allC.reduce((s,c)=>s+c.moCF,0);
  const avgCoc=allC.length?allC.reduce((s,c)=>s+c.coc,0)/allC.length:0;
  const avgCap=allC.length?allC.reduce((s,c)=>s+c.capRate,0)/allC.length:0;
  const totCashIn=allC.reduce((s,c)=>s+c.cashIn,0);
  const stats=[
    {l:'Total Deals',v:props.length.toString(),c:'var(--t1)'},
    {l:'Portfolio Value',v:f$(totVal),c:'var(--t1)'},
    {l:'Total Cash In',v:f$(totCashIn),c:'var(--t2)'},
    {l:'Total CF / mo',v:f$(totCF)+'/mo',c:totCF>=0?'var(--ok)':'var(--bad)'},
    {l:'Avg Cap Rate',v:fp$(avgCap)+'%',c:avgCap>=6?'var(--ok)':avgCap>=4?'var(--warn)':'var(--bad)'},
    {l:'Avg CoC Return',v:fp$(avgCoc)+'%',c:avgCoc>=8?'var(--ok)':avgCoc>=5?'var(--warn)':'var(--bad)'},
  ];
  const statuses=[['lead','Lead'],['analyzing','Analyzing'],['offer-out','Offer Out'],['under-contract','Contract'],['closed','Active'],['monitoring','Monitoring'],['archived','Archived']];
  const strats=[['buy-hold','Buy & Hold'],['BRRRR','BRRRR'],['section8','Sec. 8'],['flip','Flip'],['STR','STR'],['house-hack','House Hack']];
  return `
  <div class="ph"><h1>My <span>Portfolio</span></h1><span style="font-size:13px;color:var(--t3)">${fp.length} of ${props.length}</span><div style="flex:1"></div></div>
  ${props.length>0?`<div class="stats-bar">${stats.map(s=>`<div class="stat-chip"><div class="stat-chip-label">${s.l}</div><div class="stat-chip-val" style="color:${s.c}">${s.v}</div></div>`).join('')}</div>`:''}
  <div class="filter-row">
    <span class="fl">Status</span>
    <button class="fb ${fStat==='all'?'on':''}" onclick="fStat='all';render()">All</button>
    ${statuses.map(([v,l])=>`<button class="fb ${fStat===v?'on':''}" onclick="fStat='${v}';render()">${l}</button>`).join('')}
    <div style="flex:1"></div>
    <div class="sw"><span class="sw-icon">⌕</span><input id="srch" class="fi" placeholder="Search…" value="${q.replace(/"/g,'&quot;')}" style="padding-left:28px"></div>
    <select class="sort-sel" onchange="sortBy=this.value;render()">
      <option value="score" ${sortBy==='score'?'selected':''}>Score</option>
      <option value="cf" ${sortBy==='cf'?'selected':''}>Cash Flow</option>
      <option value="cap" ${sortBy==='cap'?'selected':''}>Cap Rate</option>
      <option value="price" ${sortBy==='price'?'selected':''}>Price</option>
      <option value="date" ${sortBy==='date'?'selected':''}>Newest</option>
    </select>
  </div>
  <div class="filter-row" style="margin-top:-6px">
    <span class="fl">Strategy</span>
    <button class="fb ${fStrat==='all'?'on':''}" onclick="fStrat='all';render()">All</button>
    ${strats.map(([v,l])=>`<button class="fb ${fStrat===v?'on':''}" onclick="fStrat='${v}';render()">${l}</button>`).join('')}
  </div>
  ${cmpIds.size>0?`<div class="notice"  style="margin-bottom:10px">⧖ ${cmpIds.size} propert${cmpIds.size>1?'ies':'y'} selected — <button onclick="nav('compare')" style="background:none;border:none;color:var(--info);cursor:pointer;font-size:12px;font-family:var(--body)">View Comparison →</button></div>`:''}
  ${fp.length===0?renderEmpty():` <div class="pgrid">${fp.map(p=>renderCard(p)).join('')}</div>`}`;
}
function fp$(n,d=1){return isNaN(n)?'0':n.toFixed(d);}
function renderEmpty(){return`<div class="empty"><div class="ei">🏘</div><h3>No deals yet</h3><p>Add your first investment property to get started.</p><button class="btn btn-gold" onclick="openAdd()">+ Add First Deal</button></div>`;}

function renderCard(p){
  const c=calc(p);const sc=c.sc;const scC=scColor(sc);
  const ua=p.units>1?(p.units+' units · '):'';
  return `
  <div class="pcard ${cmpIds.has(p.id)?'cmp':''}" onclick="nav('detail','${p.id}')">
    <button class="ctog ${cmpIds.has(p.id)?'on':''}" onclick="event.stopPropagation();toggleCmp('${p.id}')">${cmpIds.has(p.id)?'✓':'+'}</button>
    <div class="ctop">
      <div class="cbadges">
        <span class="bg bg-strat">${stratL(p.strategy)}</span>
        <span class="bg ${bgCls(p.status)}">${statL(p.status)}</span>
        <span class="bg bg-src">${p.source||'MLS'}</span>
      </div>
      <div class="cadr">${p.address||'Untitled Property'}</div>
      <div class="cmeta">${[p.city,p.state].filter(Boolean).join(', ')} · ${p.type} · ${ua}${p.beds||0}bd/${p.baths||0}ba · ${(+p.sqft||0).toLocaleString()} sf</div>
      <div class="cprice">${f$(+p.purchasePrice||+p.listPrice)} <span>· ${f$(+p.rent)}/mo rent</span></div>
    </div>
    <div class="ckpis">
      <div class="kc"><div class="klbl">CoC Return</div><div class="kval ${kcol(c.coc,'coc')}">${fp$(c.coc)}%</div></div>
      <div class="kc"><div class="klbl">Cap Rate</div><div class="kval ${kcol(c.capRate,'cap')}">${fp$(c.capRate)}%</div></div>
      <div class="kc"><div class="klbl">Cash Flow</div><div class="kval ${kcol(c.moCF,'cf')}">${c.moCF>=0?'+':''}${f$(c.moCF)}/mo</div></div>
      <div class="kc"><div class="klbl">DSCR</div><div class="kval ${kcol(c.dscr,'dscr')}">${fx(c.dscr)}</div></div>
      <div class="kc"><div class="klbl">1% Rule</div><div class="kval ${kcol(c.pct1,'p1')}">${fp$(c.pct1)}%</div></div>
      <div class="kc"><div class="klbl">GRM</div><div class="kval ${kcol(c.grm,'grm')}">${fx(c.grm,1)}</div></div>
    </div>
    <div class="cscore">
      <span style="font-size:10px;color:var(--t3);min-width:65px">Deal Score</span>
      <div class="cstk"><div class="csfill" style="width:${sc}%;background:${scC}"></div></div>
      <span class="csnum" style="color:${scC}">${sc}</span>
      <span class="csverd" style="color:${scC}">${scVerdict(sc)}</span>
    </div>
    <div class="cacts" onclick="event.stopPropagation()">
      <button class="btn btn-ghost btn-sm" onclick="nav('detail','${p.id}')">Analyze →</button>
      <button class="btn btn-ghost btn-sm" onclick="openEdit('${p.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="doDelete('${p.id}')">Delete</button>
    </div>
  </div>`;
}

/* ── DETAIL ── */
function renderDetail(){
  const p=props.find(x=>x.id===activeId);
  if(!p)return`<div class="empty"><h3>Not found</h3><button class="btn btn-ghost" onclick="nav('portfolio')">← Back</button></div>`;
  const c=calc(p);
  const tabs=[['overview','Overview'],['cashflow','Cash Flow'],['brrrr','BRRRR/Rehab'],['tax','Tax & Depreciation'],['stress','Stress Test'],['holding','Hold Period'],['dd','Due Diligence'],['exit','Exit Strategies']];
  const ua=p.units>1?(p.units+' units · '):'';
  return `
  <button class="back-btn" onclick="nav('portfolio')">← Portfolio</button>
  <div class="dtitle">${p.address||'Untitled Property'}</div>
  <div class="dmeta">
    <div class="cbadges" style="display:flex;gap:5px;flex-wrap:wrap">
      <span class="bg bg-strat">${stratL(p.strategy)}</span>
      <span class="bg ${bgCls(p.status)}">${statL(p.status)}</span>
      <span class="bg bg-src">${p.source||'MLS'}</span>
    </div>
    <span class="sep">·</span>
    <span>${[p.city,p.state].filter(Boolean).join(', ')}</span>
    <span class="sep">·</span>
    <span>${p.type} · ${ua}${p.beds}bd/${p.baths}ba · ${(+p.sqft||0).toLocaleString()} sf · Built ${p.yearBuilt}</span>
  </div>
  <div class="dacts">
    <button class="btn btn-ghost btn-sm" onclick="toggleCmp('${p.id}')">${cmpIds.has(p.id)?'✓ In Compare':'+ Compare'}</button>

function tabStress(p,c){
  const sd=stressD;
  const sr=+p.rent*(1-sd.rd/100)*(+p.units||1)*12;
  const sv=sr*((Math.min(100,+p.vacRate+sd.vi))/100);
  const segi=sr-sv;
  const smgmt=segi*((+p.mgmtPct)/100);
  const sopex=+p.taxes + +p.ins + +p.hoa*12 + +p.maint*12 + +p.capex*12 + +p.utils*12 + smgmt + (sd.ei/100*c.opex);
  const snoi=segi-sopex;
  const srate=(+p.rate+sd.ri)/100/12; const n=(+p.term)*12;
  const smort=srate>0?c.loan*srate*Math.pow(1+srate,n)/(Math.pow(1+srate,n)-1):c.loan/n;
  const scf=(snoi-smort*12-sd.cx)/12;
  const sdscr=smort*12>0?snoi/(smort*12):0;
  const ok=scf>=0&&sdscr>=1.0; const warn=scf>=-200||sdscr>=0.85;
  return `
  <div class="sctrl">
    <h3>Scenario Controls</h3>
    <div class="sr"><span class="sr-lbl">Rent decrease (%)</span><input type="range" min="0" max="30" value="${sd.rd}" oninput="stressD.rd=+this.value;render()"><span class="sr-val">${sd.rd}%</span></div>
    <div class="sr"><span class="sr-lbl">Added vacancy (%)</span><input type="range" min="0" max="35" value="${sd.vi}" oninput="stressD.vi=+this.value;render()"><span class="sr-val">+${sd.vi}%</span></div>
    <div class="sr"><span class="sr-lbl">Rate increase (%)</span><input type="range" min="0" max="4" step="0.25" value="${sd.ri}" oninput="stressD.ri=+this.value;render()"><span class="sr-val">+${sd.ri}%</span></div>
    <div class="sr"><span class="sr-lbl">Expense increase (%)</span><input type="range" min="0" max="50" value="${sd.ei}" oninput="stressD.ei=+this.value;render()"><span class="sr-val">+${sd.ei}%</span></div>
    <div class="sr"><span class="sr-lbl">One-time CapEx ($)</span><input type="range" min="0" max="30000" step="500" value="${sd.cx}" oninput="stressD.cx=+this.value;render()"><span class="sr-val">${f$(sd.cx)}</span></div>
    <div class="presets">
      <span style="font-size:11px;color:var(--t3);align-self:center">Presets:</span>
      <button class="preset" onclick="stressD={rd:10,vi:10,ri:.5,ei:10,cx:0};render()">Mild Downturn</button>
      <button class="preset" onclick="stressD={rd:15,vi:15,ri:1,ei:20,cx:5000};render()">Moderate Recession</button>
      <button class="preset" onclick="stressD={rd:25,vi:25,ri:2,ei:30,cx:15000};render()">Severe Crash</button>
      <button class="preset" onclick="stressD={rd:0,vi:30,ri:0,ei:0,cx:0};render()">Long Vacancy</button>
      <button class="preset" onclick="stressD={rd:0,vi:0,ri:3,ei:0,cx:0};render()">Rate Spike +3%</button>
      <button class="preset" onclick="stressD={rd:0,vi:0,ri:0,ei:0,cx:20000};render()">Major CapEx Hit</button>
      <button class="preset" onclick="stressD={rd:0,vi:8,ri:0,ei:0,cx:0};render()">Reset</button>
    </div>
  </div>
  <div class="kgrid">
    ${kcard('Stressed NOI',f$(snoi),'vs base '+f$(c.noi),snoi>=0?80:20,snoi>=0?'var(--ok)':'var(--bad)')}
    ${kcard('Stressed CF/mo',f$(scf)+'/mo','vs base '+f$(c.moCF)+'/mo',scf>=0?80:20,scf>=0?'var(--ok)':'var(--bad)')}
    ${kcard('Stressed DSCR',fx(sdscr),'vs base '+fx(c.dscr),Math.min(100,sdscr/1.5*100),sdscr>=1.25?'var(--ok)':sdscr>=1?'var(--warn)':'var(--bad)')}
    ${kcard('Stressed Rate',fp$(+p.rate+sd.ri)+'%','vs base '+fp$(+p.rate)+'%',100,'var(--t2)')}
  </div>
  <div class="bres ${ok?'ok':warn?'warn':'bad'}">
    <span style="font-size:18px">${ok?'✓':warn?'⚠':'✗'}</span>
    <div>
      <div style="font-weight:600">${ok?'Deal survives — positive cash flow maintained':warn?'Deal is marginal — thin cushion, build reserves':'Deal FAILS — negative cash flow under this scenario'}</div>
      <div style="font-size:12px;opacity:.85;margin-top:3px">Stressed CF: ${f$(scf)}/mo · Stressed DSCR: ${fx(sdscr)} · ${ok?'Resilient deal.':warn?'Ensure 6+ month cash reserve.':'Renegotiate price before proceeding.'}</div>
    </div>
  </div>`;
}

function renderTools(){

  return`
  <div class="mhdr"><h2>${isEdit?'Edit Property':'Add New Deal'}</h2><button class="btn btn-ghost btn-sm" onclick="closeMod()">✕</button></div>
  <div class="mbody">
    <div class="fsec"><div class="fsec-title">📍 Property Info</div></div>
    <div class="fg full"><label class="flbl">Street Address</label>${inp('address')}</div>
    <div class="fg"><label class="flbl">City</label>${inp('city')}</div>
    <div class="fg"><label class="flbl">State</label>${inp('state')}</div>
    <div class="fg"><label class="flbl">Zip</label>${inp('zip')}</div>
    <div class="fg"><label class="flbl">Property Type</label>${sel('type',[['SFR','SFR'],['Duplex','Duplex'],['Triplex','Triplex'],['Fourplex','Fourplex'],['5+ Unit MFR','5+ Unit MFR'],['Commercial','Commercial']])}</div>
    <div class="fg"><label class="flbl">Units</label>${inp2('units')}</div>
    <div class="fg"><label class="flbl">Beds</label>${inp2('beds')}</div>
    <div class="fg"><label class="flbl">Baths</label>${inp2('baths','number','0.5')}</div>
    <div class="fg"><label class="flbl">Sq Footage</label>${inp2('sqft')}</div>
    <div class="fg"><label class="flbl">Year Built</label>${inp2('yearBuilt')}</div>
    <div class="fg full"><label class="flbl">Listing URL</label>${inp('listingUrl')}</div>

    <div class="fsec"><div class="fsec-title">🎯 Strategy & Status</div></div>
    <div class="fg"><label class="flbl">Strategy</label>${sel('strategy',[['buy-hold','Buy & Hold'],['BRRRR','BRRRR'],['section8','Section 8'],['flip','Fix & Flip'],['STR','Short-Term Rental'],['house-hack','House Hack']])}</div>
    <div class="fg"><label class="flbl">Status</label>${sel('status',[['lead','Lead'],['analyzing','Analyzing'],['offer-out','Offer Out'],['under-contract','Under Contract'],['closed','Active / Closed'],['monitoring','Monitoring'],['archived','Archived']])}</div>
    <div class="fg"><label class="flbl">Source</label>${sel('source',[['MLS','MLS'],['Wholesale','Wholesale'],['Off-Market / DFD','Off-Market / DFD'],['Probate / Estate','Probate / Estate'],['Network','Network'],['Auction','Auction'],['REO / Bank','REO / Bank'],['Other','Other']])}</div>
    <div class="fg"><label class="flbl">Seller Motivation Score (0–100)<div class="fhint">Higher = more motivated = deeper discount possible</div></label>${inp2('motivScore')}</div>

    <div class="fsec"><div class="fsec-title">💰 Purchase Financials</div></div>
    <div class="fg"><label class="flbl">List Price ($)</label>${inp2('listPrice')}</div>
    <div class="fg"><label class="flbl">Offer Price ($)</label>${inp2('offerPrice')}</div>
    <div class="fg"><label class="flbl">Purchase / Close Price ($)</label>${inp2('purchasePrice')}</div>
    <div class="fg"><label class="flbl">Closing Costs (%)</label>${inp2('closingPct','number','0.5')}</div>

    <div class="fsec"><div class="fsec-title">🏠 Rental Income</div></div>
    <div class="fg"><label class="flbl">Monthly Rent / Unit ($)</label>${inp2('rent')}</div>
    <div class="fg"><label class="flbl">Other Income / Mo ($)<div class="fhint">Laundry, parking, storage…</div></label>${inp2('otherIncome')}</div>
    <div class="fg"><label class="flbl">Vacancy Rate (%)</label>${inp2('vacRate','number','0.5')}</div>

    <div class="fsec"><div class="fsec-title">📊 Operating Expenses</div></div>
    <div class="fg"><label class="flbl">Property Taxes ($/yr)</label>${inp2('taxes')}</div>
    <div class="fg"><label class="flbl">Insurance ($/yr)</label>${inp2('ins')}</div>
    <div class="fg"><label class="flbl">HOA ($/mo)</label>${inp2('hoa')}</div>
    <div class="fg"><label class="flbl">Property Mgmt (%)</label>${inp2('mgmtPct','number','0.5')}</div>
    <div class="fg"><label class="flbl">Maintenance Reserve ($/mo)</label>${inp2('maint')}</div>
    <div class="fg"><label class="flbl">CapEx Reserve ($/mo)</label>${inp2('capex')}</div>
    <div class="fg"><label class="flbl">Utilities — if LL pays ($/mo)</label>${inp2('utils')}</div>

    <div class="fsec"><div class="fsec-title">🏦 Financing</div></div>
    <div class="fg"><label class="flbl">Down Payment (%)</label>${inp2('downPct','number','0.5')}</div>
    <div class="fg"><label class="flbl">Interest Rate (%)</label>${inp2('rate','number','0.125')}</div>

    <div class="fsec"><div class="fsec-title">🔨 BRRRR / Rehab</div></div>
    <div class="fg"><label class="flbl">After Repair Value ($)</label>${inp2('arv')}</div>
    <div class="fg"><label class="flbl">Est. Rehab Cost ($)</label>${inp2('rehab')}</div>
    <div class="fg"><label class="flbl">Hard Money Rate (%)</label>${inp2('hmRate')}</div>
    <div class="fg"><label class="flbl">Hard Money Points</label>${inp2('hmPts','number','0.5')}</div>
    <div class="fg"><label class="flbl">Holding Period (months)</label>${inp2('holdMo')}</div>

    <div class="fsec"><div class="fsec-title">📋 Notes</div></div>
    <div class="fg full"><label class="flbl">General Notes</label><textarea class="fta" data-f="notes">${p.notes||''}</textarea></div>
    <div class="fg full"><label class="flbl">Seller / Motivation Notes</label><textarea class="fta" data-f="motivNotes">${p.motivNotes||''}</textarea></div>

    <div class="flive" id="flive">
      ${fli('NOI/yr',f$(c.noi),c.noi>=0?'var(--ok)':'var(--bad)')}
      ${fli('CF/mo',f$(c.moCF)+'/mo',c.moCF>=200?'var(--ok)':c.moCF>=0?'var(--warn)':'var(--bad)')}
      ${fli('Cap Rate',fp$(c.capRate)+'%',c.capRate>=6?'var(--ok)':c.capRate>=4?'var(--warn)':'var(--bad)')}
      ${fli('CoC Return',fp$(c.coc)+'%',c.coc>=8?'var(--ok)':c.coc>=5?'var(--warn)':'var(--bad)')}

  </div>
  <div class="mfoot"><button class="btn btn-ghost" onclick="closeMod()">Cancel</button><button class="btn btn-gold" onclick="doSave()">${isEdit?'Save Changes':'Add to Portfolio'}</button></div>`;
}
function fli(l,v,c){return`<div><div class="fli-lbl">${l}</div><div class="fli-val" style="color:${c}">${v}</div></div>`;}
function bindMod(){
  document.querySelectorAll('[data-f]').forEach(el=>{
    el.addEventListener('input',()=>{
      if(!editP)return;
      const f=el.dataset.f;
      editP[f]=el.type==='number'||el.tagName==='SELECT'&&!isNaN(el.value)?(parseFloat(el.value)||0):el.value;
      const c2=calc(editP);
      const live=document.getElementById('flive');
      if(live)live.innerHTML=`
        ${fli('NOI/yr',f$(c2.noi),c2.noi>=0?'var(--ok)':'var(--bad)')}
        ${fli('CF/mo',f$(c2.moCF)+'/mo',c2.moCF>=200?'var(--ok)':c2.moCF>=0?'var(--warn)':'var(--bad)')}
        ${fli('Cap Rate',fp$(c2.capRate)+'%',c2.capRate>=6?'var(--ok)':c2.capRate>=4?'var(--warn)':'var(--bad)')}
        ${fli('CoC Return',fp$(c2.coc)+'%',c2.coc>=8?'var(--ok)':c2.coc>=5?'var(--warn)':'var(--bad)')}
        ${fli('DSCR',fx(c2.dscr),c2.dscr>=1.25?'var(--ok)':c2.dscr>=1?'var(--warn)':'var(--bad)')}
        ${fli('Score',c2.sc+'/100',scColor(c2.sc))}`;
    });
  });
}

/* ── ACTIONS ── */
async function doSave(){
  if(!editP)return;
  if(!editP.address.trim()&&!confirm('Save without an address?'))return;
  const idx=props.findIndex(x=>x.id===editP.id);
  if(idx>=0)props[idx]={...editP};else props.unshift({...editP});
  await saveP(editP);
  closeMod();render();
}
async function doDelete(id){
  if(!confirm('Delete this property? This cannot be undone.'))return;
  props=props.filter(p=>p.id!==id);
  cmpIds.delete(id);
  await delP(id);
  if(view==='detail'&&activeId===id){view='portfolio';activeId=null;}
  render();
}
function toggleCmp(id){
  if(cmpIds.has(id)){cmpIds.delete(id);}
  else if(cmpIds.size<4){cmpIds.add(id);}
  else{alert('Max 4 properties for comparison.');return;}
  render();
}
async function toggleDD(propId,itemId){
  if(!ddState[propId])ddState[propId]={};
  ddState[propId][itemId]=!ddState[propId][itemId];
  await saveDD(propId,ddState[propId]);
  render();
}
async function clearDD(propId){
  ddState[propId]={};await saveDD(propId,{});render();
}

/* ── HELPERS ── */
function stratL(s){return{['buy-hold']:'Buy & Hold','BRRRR':'BRRRR','section8':'Section 8','flip':'Fix & Flip','STR':'STR','house-hack':'House Hack'}[s]||s;}
function statL(s){return{lead:'Lead',analyzing:'Analyzing','offer-out':'Offer Out','under-contract':'Under Contract',closed:'Active',monitoring:'Monitoring',archived:'Archived'}[s]||s;}
function bgCls(s){return{'lead':'bg-lead','analyzing':'bg-analyzing','offer-out':'bg-offer','under-contract':'bg-contract','closed':'bg-closed','monitoring':'bg-monitoring','archived':'bg-archived'}[s]||'bg-lead';}

];

/* ── INIT ── */
async function init(){
  try{
    props=await loadAll();
    if(props.length===0){
      for(const p of SAMPLES)await saveP(p);
      props=[...SAMPLES];
    }
    for(const p of props)ddState[p.id]=await loadDD(p.id);
  }catch(e){
    console.warn('Storage init failed, using samples:',e);
    props=[...SAMPLES];
  }
  render();
}
init();
</script>
